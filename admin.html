<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - পড়তে বসি</title>
  <link rel="manifest" href="admin-manifest.json">
  <meta name="theme-color" content="#0D1B2A">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui, sans-serif; min-height:100vh; }
    
    #loginPage { display: none;
      display: none; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #15803D 0%, #0D4A2A 100%);
      padding: 20px;
    }
    .login-box {
      background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
      border-radius: 24px; padding: 48px 36px; max-width: 420px; width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .login-box .icon {
      width: 64px; height: 64px; background: #15803D; border-radius: 16px;
      margin: 0 auto 24px; display: none; align-items: center; justify-content: center;
    }
    .login-box h2 { color: #0F172A; font-size: 1.6rem; margin-bottom: 8px; }
    .login-box h2 span { color: #15803D; }
    .login-box p { color: #64748B; font-size: 0.95rem; margin-bottom: 32px; }
    
      
    </div>
  </div>

  <div id="dashboardPage">
    <div class="header"><h1>Admin Panel</h1><button onclick="handleLogout()">Logout</button></div>
    <div class="container">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('videos')">Videos</button>
        <button class="tab" onclick="switchTab('writings')">Writings</button>
        <button class="tab" onclick="switchTab('questions')">Questions</button>
      </div>

      <div id="tab-videos">
        <div class="form-card"><h3>Add Video</h3>
          <div class="form-group"><label>Title</label><input type="text" id="vTitle"></div>
          <div class="form-group"><label>Class</label><select id="vClass"><option value="All">All</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9-10">9-10</option></select></div>
          <div class="form-group"><label>Subject</label><input type="text" id="vSubject"></div>
          <div class="form-group"><label>Chapter</label><input type="text" id="vChapter"></div>
          <div class="form-group"><label>Video URL</label><input type="text" id="vUrl"></div>
          <button class="btn-submit" onclick="addVideo()">Add Video</button>
        </div>
        <div class="list-grid" id="videosList"></div>
      </div>

      <div id="tab-writings" style="display:none;">
        <div class="form-card"><h3>Add Writing</h3>
          <div class="form-group"><label>Category</label><select id="wCategory"><option value="paragraph">Paragraph</option><option value="essay">Essay</option><option value="letter">Letter</option></select></div>
          <div class="form-group"><label>Title</label><input type="text" id="wTitle"></div>
          <div class="form-group"><label>Class</label><select id="wClass"><option value="All">All</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9-10">9-10</option></select></div>
          <div class="form-group"><label>Subject</label><input type="text" id="wSubject"></div>
          <div class="form-group"><label>Content</label><textarea id="wContent"></textarea></div>
          <button class="btn-submit" onclick="addWriting()">Add Writing</button>
        </div>
        <div class="list-grid" id="writingsList"></div>
      </div>

      <div id="tab-questions" style="display:none;">
        <div class="form-card"><h3>Add MCQ</h3>
          <div class="form-group"><label>Class</label><select id="qClass"><option value="All">All</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9-10">9-10</option></select></div>
          <div class="form-group"><label>Subject</label><input type="text" id="qSubject"></div>
          <div class="form-group"><label>Chapter</label><input type="text" id="qChapter"></div>
          <div class="form-group"><label>Question</label><textarea id="qQuestion"></textarea></div>
          <div class="form-group"><label>Option 1</label><input type="text" id="qOpt1"></div>
          <div class="form-group"><label>Option 2</label><input type="text" id="qOpt2"></div>
          <div class="form-group"><label>Option 3</label><input type="text" id="qOpt3"></div>
          <div class="form-group"><label>Option 4</label><input type="text" id="qOpt4"></div>
          <div class="form-group"><label>Correct Answer Number (1-4)</label><input type="number" id="qCorrect" min="1" max="4"></div>
          <button class="btn-submit" onclick="addQuestion()">Add Question</button>
        </div>
        <div class="list-grid" id="questionsList"></div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const db = firebase.firestore();
    
    async function checkAdminAccess(user) {
      if (!user) return false;
      const doc = await db.collection('admins').doc(user.uid).get();
      return doc.exists;
    }

    auth.onAuthStateChanged(async function(user) {
      if (user) {
        const isAdmin = await checkAdminAccess(user);
        if (isAdmin) {
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('dashboardPage').style.display = 'block';
          loadAllData();
        } else {
          // Not an admin – show access denied and sign out
          document.getElementById('accessDenied').style.display = 'block';
          document.getElementById('loginError').style.display = 'none';
          auth.signOut();
        }
      } else {
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('dashboardPage').style.display = 'none'; document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('accessDenied').style.display = 'none';
      }
    });


    function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      auth.signInWithEmailAndPassword(email, password)
        .catch(error => {
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('loginError').textContent = error.message;
        });
    }

    function handleLogout() { auth.signOut(); }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('[id^="tab-"]').forEach(d => d.style.display = 'none');
      document.getElementById('tab-' + tab).style.display = 'block';
    }

    async function addVideo() {
      const title = document.getElementById('vTitle').value.trim();
      if (!title) return alert('Title required');
      await db.collection('videos').add({
        title, class: document.getElementById('vClass').value,
        subject: document.getElementById('vSubject').value,
        chapter: document.getElementById('vChapter').value,
        url: document.getElementById('vUrl').value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('Video added!');
      ['vTitle','vSubject','vChapter','vUrl'].forEach(id => document.getElementById(id).value = '');
      loadVideos();
    }

    async function loadVideos() {
      const s = await db.collection('videos').orderBy('createdAt','desc').get();
      document.getElementById('videosList').innerHTML = s.docs.map(d => `
        <div class="list-card"><h4>${d.data().title}</h4><p>Class ${d.data().class} • ${d.data().subject||''}</p><button onclick="deleteItem('videos','${d.id}')">Delete</button></div>
      `).join('') || '<p>No videos</p>';
    }

    async function addWriting() {
      const title = document.getElementById('wTitle').value.trim();
      if (!title) return alert('Title required');
      await db.collection('writings').add({
        category: document.getElementById('wCategory').value, title,
        class: document.getElementById('wClass').value,
        subject: document.getElementById('wSubject').value,
        content: document.getElementById('wContent').value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('Writing added!');
      ['wTitle','wContent'].forEach(id => document.getElementById(id).value = '');
      loadWritings();
    }

    async function loadWritings() {
      const s = await db.collection('writings').orderBy('createdAt','desc').get();
      document.getElementById('writingsList').innerHTML = s.docs.map(d => `
        <div class="list-card"><h4>${d.data().title}</h4><p>${d.data().category} • Class ${d.data().class}</p><button onclick="deleteItem('writings','${d.id}')">Delete</button></div>
      `).join('') || '<p>No writings</p>';
    }

    async function addQuestion() {
      const q = document.getElementById('qQuestion').value.trim();
      if (!q) return alert('Question required');
      const correct = parseInt(document.getElementById('qCorrect').value);
      if (!correct || correct < 1 || correct > 4) return alert('Correct answer number required');
      const opts = [document.getElementById('qOpt1').value, document.getElementById('qOpt2').value, document.getElementById('qOpt3').value, document.getElementById('qOpt4').value];
      await db.collection('questions').add({
        type: 'mcq', class: document.getElementById('qClass').value,
        subject: document.getElementById('qSubject').value,
        chapter: document.getElementById('qChapter').value,
        question: q, options: opts.join(','), answer: opts[correct-1],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('Question added!');
      document.getElementById('qQuestion').value = '';
      loadQuestions();
    }

    async function loadQuestions() {
      const s = await db.collection('questions').orderBy('createdAt','desc').limit(20).get();
      document.getElementById('questionsList').innerHTML = s.docs.map(d => `
        <div class="list-card"><h4>${(d.data().question||'').substring(0,60)}...</h4><p>${d.data().type} • Class ${d.data().class} • ${d.data().subject}</p><button onclick="deleteItem('questions','${d.id}')">Delete</button></div>
      `).join('') || '<p>No questions</p>';
    }

    async function deleteItem(collection, id) {
      if (confirm('Delete this item?')) {
        await db.collection(collection).doc(id).delete();
        loadAllData();
      }
    }

    function loadAllData() { loadVideos(); loadWritings(); loadQuestions(); }
  </script>
</body>
</html>
