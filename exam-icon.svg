<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Background -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="#0D1B2A"/>
  
  <!-- Clipboard body -->
  <rect x="28" y="20" width="44" height="60" rx="4" fill="none" stroke="#D4AF37" stroke-width="2.8" stroke-linejoin="round"/>
  
  <!-- Clipboard top fold -->
  <path d="M32 20 L32 14 L68 14 L68 20" fill="none" stroke="#D4AF37" stroke-width="2.8" stroke-linejoin="round"/>
  
  <!-- Checkmark -->
  <polyline points="38 52 46 60 62 42" fill="none" stroke="#D4AF37" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Top lines (paper effect) -->
  <line x1="36" y1="30" x2="50" y2="30" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="36" x2="56" y2="36" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
