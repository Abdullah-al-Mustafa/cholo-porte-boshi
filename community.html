<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Community - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .community-page { max-width: 700px; margin: 0 auto; width: 100%; }
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp4); margin-bottom: var(--sp3); transition: all var(--tr-base); box-shadow: var(--sh-sm); }
    .post-card:hover { box-shadow: var(--sh-md); border-color: var(--secondary-hover); }
    .post-card h3 { font-size: var(--text-lg); font-weight: 700; color: var(--heading); margin-bottom: 4px; }
    .post-card .meta { font-size: var(--text-xs); color: var(--muted); margin-bottom: var(--sp1); display: flex; gap: var(--sp1); align-items: center; }
    .post-card .content { font-size: var(--text-sm); color: var(--body); line-height: 1.7; }
    .post-card img { width: 100%; border-radius: var(--r-sm); margin-top: var(--sp1); }
    .post-card .video-embed { width: 100%; border-radius: var(--r-sm); margin-top: var(--sp1); aspect-ratio: 16/9; border: none; }
    .news-badge { background: var(--primary); color: white; padding: 2px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .post-badge { background: var(--accent); color: var(--primary-dark); padding: 2px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .comment-icon { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; color: var(--primary); font-weight: 600; font-size: var(--text-xs); margin-top: var(--sp1); }
    .comment-icon svg { width: 18px; height: 18px; stroke: var(--primary); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    body.dark .post-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .post-card h3 { color: var(--dark-heading); }
    body.dark .comment-icon, body.dark .comment-icon svg { color: var(--accent); stroke: var(--accent); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">Community</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="community-page" id="communityPosts"><p class="text-muted">লোড হচ্ছে...</p></div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a>
    <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>সেটিংস</span></a>
    <a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a>
    <a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a>
    <a href="community.html" class="nav-item active"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span>Community</span></a>
  </nav>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();

    function getYoutubeEmbed(url) {
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return m ? `https://www.youtube.com/embed/${m[1]}` : '';
    }

    function getFacebookEmbed(url) {
      return url.includes('facebook.com') || url.includes('fb.watch') ? url : '';
    }

    function renderVideo(videoUrl) {
      if (!videoUrl) return '';
      const yt = getYoutubeEmbed(videoUrl);
      if (yt) return `<iframe class="video-embed" src="${yt}" allowfullscreen></iframe>`;
      const fb = getFacebookEmbed(videoUrl);
      if (fb) return `<a href="${fb}" target="_blank" class="btn btn-primary" style="margin-top:var(--sp1);display:inline-flex;gap:6px;">▶ ফেসবুক ভিডিও দেখুন</a>`;
      if (videoUrl.match(/\.(mp4|webm|ogg)$/i)) return `<video controls style="width:100%;border-radius:var(--r-sm);margin-top:var(--sp1);"><source src="${videoUrl}"></video>`;
      return `<a href="${videoUrl}" target="_blank" class="btn btn-primary" style="margin-top:var(--sp1);display:inline-flex;gap:6px;">▶ ভিডিও দেখুন</a>`;
    }

    async function loadPosts() {
      const s = await db.collection('community').orderBy('createdAt','desc').get();
      const container = document.getElementById('communityPosts');
      if (s.empty) { container.innerHTML = '<p class="text-muted">এখনো কোনো পোস্ট নেই। শীঘ্রই আসছে!</p>'; return; }
      container.innerHTML = '';
      for (const doc of s.docs) {
        const data = doc.data();
        const isNews = data.type === 'news';
        const postDiv = document.createElement('div');
        postDiv.className = 'post-card';
        postDiv.innerHTML = `
          <h3>${data.title}</h3>
          <div class="meta">
            ${isNews ? '<span class="news-badge">News</span>' : '<span class="post-badge">Post</span>'}
            ${data.createdAt ? new Date(data.createdAt.seconds*1000).toLocaleDateString('bn-BD') : ''}
          </div>
          <div class="content">${data.content||''}</div>
          ${renderVideo(data.video)}
          ${data.image ? `<img src="${data.image}" alt="">` : ''}
          ${!isNews ? `
            <div class="comment-icon" onclick="location.href='comments.html?id=${doc.id}'">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              কমেন্ট
            </div>
          ` : ''}
        `;
        container.appendChild(postDiv);
      }
    }

    loadPosts();
  </script>
</body>
</html>
