<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Writings - পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0D1B2A"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .list-page { max-width:900px; margin:0 auto; width:100%; }
    .filter-bar { display:flex; gap:var(--sp1); margin-bottom:var(--sp4); flex-wrap:wrap; }
    .filter-chip { padding:6px 14px; border-radius:var(--r-full); border:1px solid var(--border); background:var(--surface); cursor:pointer; font-size:var(--text-xs); font-weight:500; transition:all var(--tr-fast); white-space:nowrap; font-family:var(--font); }
    .filter-chip:hover, .filter-chip.active { background:var(--primary); color:white; border-color:var(--primary); }
    .card-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--sp2); }
    @media (max-width:768px) { .card-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:400px) { .card-grid { grid-template-columns:1fr; } }
    .mini-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; cursor:pointer; transition:all var(--tr-base); box-shadow:var(--sh-sm); }
    .mini-card:hover { box-shadow:var(--sh-lg); border-color:var(--accent); transform:scale(1.02); }
    .mini-card .thumb { height:160px; background-size:cover; background-position:center; background-color:var(--secondary); }
    .mini-card .body { padding:var(--sp3); }
    .mini-card .body h4 { font-size:var(--text-sm); font-weight:600; color:var(--heading); margin-bottom:4px; }
    .mini-card .body .meta { font-size:var(--text-xs); color:var(--muted); }
    .badge { display:inline-block; padding:2px 8px; border-radius:var(--r-full); font-size:10px; font-weight:600; }
    .badge.subject { background:var(--secondary); color:var(--primary); }
    .badge.class { background:var(--primary); color:white; }
    .badge.all { background:var(--accent); color:var(--primary-dark); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="settings.html" class="icon-btn" aria-label="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a></div></header>
  <main class="main-content">
    <div class="list-page">
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" onclick="filterItems('All', this)">All Classes</button>
        <button class="filter-chip" onclick="filterItems('9-10', this)">Class 9-10</button>
        <button class="filter-chip" onclick="filterItems('8', this)">Class 8</button>
        <button class="filter-chip" onclick="filterItems('7', this)">Class 7</button>
        <button class="filter-chip" onclick="filterItems('6', this)">Class 6</button>
      </div>
      <div class="card-grid" id="itemsList"><p class="text-muted">Loading...</p></div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a>
    <a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a>
    <a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">AI</span><span>এআই</span></a>
    <a href="extra.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>টুলস</span></a>
  </nav>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    const params = new URLSearchParams(location.search);
    const category = params.get('category') || '';
    let allItems = [];
    function clsBadge(c) { if (!c || c === 'All' || c === 'all') return '<span class="badge all">For All</span>'; const map={'6':'Class 6','7':'Class 7','8':'Class 8','9-10':'Class 9-10'}; return `<span class="badge class">For ${map[c]||c}</span>`; }

    async function loadItems() {
      let query = db.collection('writings');
      if (category) query = query.where('category', '==', category);
      const s = await query.orderBy('createdAt','desc').get();
      allItems = s.docs.map(d => ({id: d.id, ...d.data()}));
      renderItems(allItems);
    }

    function renderItems(data) {
      document.getElementById('itemsList').innerHTML = data.length ? data.map(d => {
        const img = d.image;
        return `<div class="mini-card" onclick="location.href='writing-read.html?id=${d.id}'"><div class="thumb" style="${img?'background-image:url('+img+');':'background:var(--secondary);'}"></div><div class="body"><span class="badge subject">${d.subject||''}</span><h4>${d.title}</h4><div class="meta">${clsBadge(d.class)}</div></div></div>`;
      }).join('') : '<p class="text-muted">No items yet</p>';
    }

    function filterItems(cls, el) {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      const filtered = cls === 'All' ? allItems : allItems.filter(i => i.class === cls);
      renderItems(filtered);
    }

    loadItems();
  </script>
</body>
</html>
