<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Panel - পড়তে বসি</title>
<link rel="manifest" href="admin-manifest.json"><meta name="theme-color" content="#15803D">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Admin panel inherits global theme from style.css; only minor overrides below */
  .admin-header {
    background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
    color: white; padding: var(--sp3) var(--sp4);
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .admin-header h1 { font-size: 1.25rem; font-weight: 700; color: white; }
  .admin-header .logout-btn {
    background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.3);
    color: white; padding: 8px 16px; border-radius: var(--r-full);
    font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: background 0.2s;
  }
  .admin-header .logout-btn:hover { background: rgba(255,255,255,0.25); }
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface);
    border-radius: var(--r-md); padding: var(--sp3) var(--sp4);
    box-shadow: 0 12px 24px rgba(0,0,0,0.1); z-index: 999;
    display: flex; align-items: center; gap: var(--sp2); min-width: 280px;
    animation: slideIn 0.3s ease-out;
  }
  .toast.success { border-left: 4px solid var(--primary-green); }
  .toast.error { border-left: 4px solid #DC2626; }
  @keyframes slideIn { from { transform: translateX(120%); opacity:0; } to { transform: translateX(0); opacity:1; } }
  .login-container {
    max-width: 400px; margin: 80px auto; padding: var(--sp6);
    background: var(--surface); border-radius: var(--r-lg);
    box-shadow: 0 12px 28px rgba(0,0,0,0.07); text-align: center;
  }
  .login-container h2 { margin-bottom: var(--sp4); color: var(--heading); }
  .login-container input {
    width: 100%; padding: var(--sp2); margin-bottom: var(--sp3);
    border: 2px solid var(--border); border-radius: var(--r-md);
    font-size: 1rem; transition: border-color 0.2s;
  }
  .login-container input:focus { border-color: var(--primary-green); outline: none; }
  .login-container button {
    width: 100%; padding: var(--sp2); background: var(--primary-green);
    color: white; border: none; border-radius: var(--r-md);
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .login-container button:hover { background: var(--dark-green); }
  .dashboard { max-width: 960px; margin: var(--sp6) auto; padding: 0 var(--sp3); display: none; }
  .tabs { display: flex; gap: var(--sp2); margin-bottom: var(--sp5); flex-wrap: wrap; }
  .tab {
    padding: 10px 22px; border-radius: var(--r-full); background: var(--surface);
    border: 1.5px solid var(--border); color: var(--body); font-weight: 600;
    font-size: 0.9rem; cursor: pointer; transition: all 0.2s; box-shadow: var(--sh-sm);
  }
  .tab.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }
  .sub-tabs { display: flex; gap: var(--sp1); margin-bottom: var(--sp4); }
  .sub-tab {
    padding: 7px 16px; border-radius: var(--r-full); background: var(--surface);
    border: 1px solid var(--border); color: var(--body); font-weight: 500;
    font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
  }
  .sub-tab.active { background: var(--accent); color: var(--primary-green); border-color: var(--accent); }
  .form-card {
    background: var(--surface); border-radius: var(--r-lg); padding: var(--sp4);
    margin-bottom: var(--sp4); box-shadow: var(--sh-sm); border: 1px solid var(--border);
  }
  .form-card h3 { margin-bottom: var(--sp3); color: var(--heading); font-size: 1.1rem; }
  .form-card input, .form-card textarea, .form-card select {
    width: 100%; padding: var(--sp2); margin-bottom: var(--sp2);
    border: 2px solid var(--border); border-radius: var(--r-sm);
    font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; background: var(--bg);
  }
  .form-card input:focus, .form-card textarea:focus, .form-card select:focus { border-color: var(--primary-green); outline: none; }
  .form-card textarea { min-height: 100px; resize: vertical; }
  .form-card .btn-primary {
    padding: var(--sp2) 24px; background: var(--primary-green); color: white;
    border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 0.9rem;
    cursor: pointer; transition: background 0.2s;
  }
  .form-card .btn-primary:hover { background: var(--dark-green); }
  .option-row { display: flex; gap: var(--sp2); align-items: center; margin-bottom: var(--sp2); }
  .option-row span { font-weight: 600; color: var(--muted); min-width: 28px; }
  .option-row input { flex:1; margin-bottom:0; }
  .list-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
    padding: var(--sp3); margin-bottom: var(--sp2);
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: var(--sh-sm); transition: box-shadow 0.2s;
  }
  .list-item:hover { box-shadow: var(--sh-md); }
  .list-item h4 { color: var(--heading); font-size: 0.9rem; }
  .list-item p { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
  .btn-danger { background: #FEE2E2; color: #DC2626; border: none; padding: 6px 14px; border-radius: var(--r-sm); font-weight: 600; font-size: 0.75rem; cursor: pointer; }
  .btn-danger:hover { background: #FECACA; }
  .file-upload-box {
    border: 2px dashed var(--border); border-radius: var(--r-sm);
    padding: var(--sp4); text-align: center; cursor: pointer;
    margin-bottom: var(--sp2); transition: border-color 0.2s; background: var(--bg);
  }
  .file-upload-box:hover { border-color: var(--primary-green); }
  .preview-img { max-width: 200px; max-height: 120px; border-radius: var(--r-sm); margin-top: var(--sp2); display: none; }
</style>
</head>
<body>
  <header class="admin-header">
    <h1>পড়তে বসি Admin</h1>
    <button class="logout-btn" onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
  </header>

  <div class="login-container" id="loginBox">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <p id="loginError" style="color:#DC2626;margin-top:var(--sp2);display:none;"></p>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="tabs">
      <button class="tab active" onclick="switchMainTab('questions')">Questions</button>
      <button class="tab" onclick="switchMainTab('writings')">Writings</button>
      <button class="tab" onclick="switchMainTab('videos')">Videos</button>
    </div>

    <div id="tab-questions">
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="switchSubTab('mcq')">MCQ</button>
        <button class="sub-tab" onclick="switchSubTab('cq')">CQ</button>
        <button class="sub-tab" onclick="switchSubTab('sq')">SQ</button>
      </div>

      <div id="sub-mcq" class="form-card"><h3>Add MCQ</h3>
        <select id="mcqClass" onchange="updateSubjectDropdown('mcq')"><option value="All">All Classes</option><option value="6">Class 6</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9-10">Class 9-10</option></select>
        <input type="text" id="mcqSubject" onchange="loadChaptersForAdmin('mcq', document.getElementById('mcqClass').value, this.value)" placeholder="Subject"><input type="text" id="mcqChapter" placeholder="Chapter">
        <textarea id="mcqQuestion" placeholder="Question"></textarea>
        <p style="color:var(--muted);font-size:0.85rem;margin-bottom:var(--sp2);">৪টি অপশন:</p>
        <div class="option-row"><span>১.</span><input type="text" id="mcqOpt1" placeholder="Option 1"></div>
        <div class="option-row"><span>২.</span><input type="text" id="mcqOpt2" placeholder="Option 2"></div>
        <div class="option-row"><span>৩.</span><input type="text" id="mcqOpt3" placeholder="Option 3"></div>
        <div class="option-row"><span>৪.</span><input type="text" id="mcqOpt4" placeholder="Option 4"></div>
        <p style="color:var(--muted);font-size:0.85rem;margin:var(--sp2) 0;">সঠিক উত্তর নম্বর:</p>
        <input type="number" id="mcqCorrectNum" placeholder="2" min="1" max="4" style="max-width:100px;">
        <button class="btn-primary" onclick="addMCQ()">Add MCQ</button>
      </div>
      <div id="sub-cq" class="form-card" style="display:none;"><h3>Add CQ</h3>
        <select id="cqClass" onchange="updateSubjectDropdown('cq')"><option value="All">All Classes</option><option value="6">Class 6</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9-10">Class 9-10</option></select>
        <input type="text" id="cqSubject" onchange="loadChaptersForAdmin('cq', document.getElementById('cqClass').value, this.value)" placeholder="Subject"><input type="text" id="cqChapter" placeholder="Chapter">
        <textarea id="cqPassage" placeholder="উদ্দীপক"></textarea>
        <p style="color:var(--muted);font-size:0.85rem;">প্রশ্ন ও কীওয়ার্ড (৪টি):</p>
        <div id="cqQuestions">
          <div class="option-row"><span>১.</span><input type="text" class="cqQ" placeholder="প্রশ্ন"><input type="text" class="cqK" placeholder="কীওয়ার্ড"></div>
          <div class="option-row"><span>২.</span><input type="text" class="cqQ" placeholder="প্রশ্ন"><input type="text" class="cqK" placeholder="কীওয়ার্ড"></div>
          <div class="option-row"><span>৩.</span><input type="text" class="cqQ" placeholder="প্রশ্ন"><input type="text" class="cqK" placeholder="কীওয়ার্ড"></div>
          <div class="option-row"><span>৪.</span><input type="text" class="cqQ" placeholder="প্রশ্ন"><input type="text" class="cqK" placeholder="কীওয়ার্ড"></div>
        </div>
        <button class="btn-primary" onclick="addCQ()">Add CQ</button>
      </div>
      <div id="sub-sq" class="form-card" style="display:none;"><h3>Add SQ</h3>
        <select id="sqClass" onchange="updateSubjectDropdown('sq')"><option value="All">All Classes</option><option value="6">Class 6</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9-10">Class 9-10</option></select>
        <input type="text" id="sqSubject" onchange="loadChaptersForAdmin('sq', document.getElementById('sqClass').value, this.value)" placeholder="Subject"><input type="text" id="sqChapter" placeholder="Chapter">
        <textarea id="sqQuestion" placeholder="Question"></textarea>
        <input type="text" id="sqKeywords" placeholder="Keywords (comma separated)">
        <button class="btn-primary" onclick="addSQ()">Add SQ</button>
      </div>
      <div id="questionsList"></div>
    </div>

    <div id="tab-writings" style="display:none;">
      <div class="form-card"><h3>Add Writing</h3>
        <select id="writingCategory">
          <option value="completing-story">Completing Story</option><option value="dialogue">Dialogue</option><option value="paragraph">Paragraph</option><option value="email">Email</option><option value="letter">Letter</option><option value="application">Application</option><option value="short-composition">Short Composition</option>
          <option value="probondho-rochona">প্রবন্ধ রচনা</option><option value="vab-somprosharon">ভাব সম্প্রসারণ</option><option value="sarangsho">সারাংশ</option><option value="sharmormo">সারমর্ম</option><option value="chitipotro">চিঠিপত্র</option><option value="songbaad-protibedon">সংবাদ প্রতিবেদন</option><option value="onucched-rochona">অনুচ্ছেদ রচনা</option>
        </select>
        <input type="text" id="writingTitle" placeholder="Title"><select id="writingClass"><option value="All">All Classes</option><option value="6">Class 6</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9-10">Class 9-10</option></select>
        <input type="text" id="writingSubject" placeholder="Subject"><textarea id="writingContent" placeholder="Content..."></textarea>
        <div class="file-upload-box" onclick="document.getElementById('writingImageInput').click()"><p>Click to upload image</p><img id="writingPreview" class="preview-img"><input type="file" id="writingImageInput" accept="image/*" style="display:none;" onchange="previewImage(this,'writingPreview','writingImageData')"><input type="hidden" id="writingImageData"></div>
        <button class="btn-primary" onclick="addWriting()">Add Writing</button>
      </div>
      <div id="writingsList"></div>
    </div>

    <div id="tab-videos" style="display:none;">
      <div class="form-card"><h3>Add Video</h3>
        <input type="text" id="videoTitle" placeholder="Title"><input type="text" id="videoSubject" placeholder="Subject"><input type="text" id="videoChapter" placeholder="Chapter">
        <select id="videoClass"><option value="All">All Classes</option><option value="6">Class 6</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9-10">Class 9-10</option></select>
        <input type="text" id="videoUrl" placeholder="Video URL">
        <button class="btn-primary" onclick="addVideo()">Add Video</button>
      </div>
      <div id="videosList"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="js/subjects.js"></script>
<script src="firebase-config.js"></script>
  <script>
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const db = firebase.firestore();
    function showToast(msg, type='success'){const t=document.createElement('div');t.className='toast '+type;t.innerHTML='<span>'+(type==='success'?'✓':'✗')+'</span> '+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    function ts(){return firebase.firestore.FieldValue.serverTimestamp();}
    function previewImage(input,previewId,dataId){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){document.getElementById(previewId).src=e.target.result;document.getElementById(previewId).style.display='block';document.getElementById(dataId).value=e.target.result;};reader.readAsDataURL(file);}
    function clearForm(ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.querySelectorAll('.preview-img').forEach(img=>{img.style.display='none';img.src='';});}

    auth.onAuthStateChanged(user=>{console.log("Auth state changed", user);if(user){document.getElementById('loginBox').style.display='none';document.getElementById('dashboard').style.display='block';document.getElementById('logoutBtn').style.display='block';loadAll();}else{document.getElementById('loginBox').style.display='block';document.getElementById('dashboard').style.display='none';document.getElementById('logoutBtn').style.display='none';}});
    function login(){console.log("Login attempt", document.getElementById('email').value);auth.signInWithEmailAndPassword(document.getElementById('email').value,document.getElementById('password').value).then(()=>showToast('Login!','success')).catch(err=>{document.getElementById('loginError').style.display='block';document.getElementById('loginError').textContent=err.message;});}
    function logout(){auth.signOut();showToast('Logged out');}

// Live thumbnail preview for video URL
document.addEventListener("input", function(e) {
  if (e.target.id === "videoUrl") {
    const url = e.target.value.trim();
    const preview = document.getElementById("videoThumbPreview");
    const noThumb = document.getElementById("noThumbText");
    if (!url) {
      preview.style.display = "none";
      noThumb.style.display = "block";
      return;
    }
    let thumb = "";
    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) thumb = "https://img.youtube.com/vi/" + ytMatch[1] + "/hqdefault.jpg";
    const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
    if (!thumb && vimeoMatch) thumb = "https://vumbnail.com/" + vimeoMatch[1] + ".jpg";
    if (thumb) {
      preview.src = thumb;
      preview.style.display = "block";
      noThumb.style.display = "none";
    } else {
      preview.style.display = "none";
      noThumb.style.display = "block";
    }
  }
});
    function switchMainTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');document.querySelectorAll('[id^="tab-"]').forEach(d=>d.style.display='none');document.getElementById('tab-'+tab).style.display='block';if(tab==='questions')switchSubTab('mcq');}
    function switchSubTab(sub){document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');document.querySelectorAll('[id^="sub-"]').forEach(d=>d.style.display='none');document.getElementById('sub-'+sub).style.display='block';}

// Load chapters when subject changes
async function loadChaptersForAdmin(type, cls, sub) {

function updateSubjectDropdown(type) {
  const cls = document.getElementById(type + "Class").value;
  const select = document.getElementById(type + "SubjectSelect");
  if (!select) return;
  select.innerHTML = "<option value=\"\">Select subject</option>";
  if (!cls) return;
  
  let subjects = [];
  if (cls === "9-10") {
    const groups = classSubjects["9-10"];
    if (groups) {
      Object.values(groups).forEach(arr => arr.forEach(s => { if (!subjects.includes(s)) subjects.push(s); }));
    }
  } else {
    subjects = classSubjects[cls] || [];
  }
  
  subjects.forEach(sub => {
    select.innerHTML += `<option value="${sub}">${sub}</option>`;
  });
}
  const selectId = type + "ChapterSelect";
  const selectEl = document.getElementById(selectId);
  if (!selectEl) return;
  const s = await db.collection("questions").where("type","==",type).where("class","==",cls).where("subject","==",sub).get();
  const chapters = [...new Set(s.docs.map(d => d.data().chapter).filter(Boolean))];
  if (chapters.length === 0) {
    selectEl.innerHTML = "<option value=\"\">No chapters found</option>";
  } else {
    selectEl.innerHTML = "<option value=\"\">Select chapter</option>" + chapters.map(ch => `<option value="${ch}">${ch}</option>`).join("");
  }
}

    async function addMCQ(){const q=document.getElementById("cqChapterSelect").value,type:'mcq',question:q,options:opts,answer:ans,createdAt:ts()});showToast('MCQ added!','success');clearForm(['mcqQuestion','mcqSubject','mcqChapter','mcqOpt1','mcqOpt2','mcqOpt3','mcqOpt4','mcqCorrectNum']);loadQuestions();}
    async function addCQ(){const passage=document.getElementById("cqChapterSelect").value='');loadQuestions();}
    async function addSQ(){const q=document.getElementById("sqChapterSelect").value;if(!q||!kw)return showToast('Question and keywords required','error');await db.collection('questions').add({type:'sq',class:cls,subject:sub,chapter:ch,question:q,keywords:kw,createdAt:ts()});showToast('SQ added!','success');clearForm(['sqQuestion','sqKeywords','sqSubject','sqChapter']);loadQuestions();}
    async function loadQuestions(){const s=await db.collection('questions').orderBy('createdAt','desc').limit(20).get();document.getElementById('questionsList').innerHTML=s.docs.map(d=>`<div class="list-item"><div><h4>${(d.data().question||d.data().passage||'').substring(0,60)}</h4><p>${d.data().type?.toUpperCase()} | Class ${d.data().class} | ${d.data().subject}</p></div><div><button class="btn-danger" onclick="del('questions','${d.id}')">Delete</button></div></div>`).join('');}

    async function addWriting(){const title=document.getElementById('writingTitle').value.trim();if(!title)return showToast('Title required','error');const cat=document.getElementById('writingCategory').value;await db.collection('writings').add({title,category:cat,class:document.getElementById('writingClass').value,subject:document.getElementById('writingSubject').value,content:document.getElementById('writingContent').value,image:document.getElementById('writingImageData').value,createdAt:ts()});showToast('Writing added!','success');clearForm(['writingTitle','writingSubject','writingContent','writingImageData']);document.getElementById('writingPreview').style.display='none';document.getElementById("writingPreview").style.display="none"; document.getElementById("writingImageData").value=""; loadWritings();}
    async function loadWritings(){const s=await db.collection('writings').orderBy('createdAt','desc').get();document.getElementById('writingsList').innerHTML=s.docs.map(d=>`<div class="list-item"><div><h4>${d.data().title}</h4><p>${d.data().category} | Class ${d.data().class}</p></div><div><button class="btn-danger" onclick="del('writings','${d.id}')">Delete</button></div></div>`).join('');}

    async function addVideo(){const t=document.getElementById('videoTitle').value.trim();if(!t)return showToast('Title required','error');await db.collection('videos').add({title:t,class:document.getElementById('videoClass').value,subject:document.getElementById('videoSubject').value,chapter:document.getElementById('videoChapter').value,url:document.getElementById('videoUrl').value,createdAt:ts()});showToast('Video added!','success');clearForm(['videoTitle','videoSubject','videoChapter','videoUrl']);loadVideos();}
    async function loadVideos(){const s=await db.collection('videos').orderBy('createdAt','desc').get();document.getElementById('videosList').innerHTML=s.docs.map(d=>`<div class="list-item"><div><h4>${d.data().title}</h4><p>Class ${d.data().class} | ${d.data().subject} | ${d.data().chapter}</p></div><div><button class="btn-danger" onclick="del('videos','${d.id}')">Delete</button></div></div>`).join('');}

    async function del(col,id){if(confirm('Delete?')){await db.collection(col).doc(id).delete();showToast('Deleted!','error');loadAll();}}
    function loadAll(){loadQuestions();loadWritings();loadVideos();}
    loadAll();
  </script>
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/cholo-porte-boshi/admin-sw.js");}</script>
</body>
</html>
