  <meta name="theme-color" content="#0D1B2A">
  <link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .exam-page { max-width: 800px; margin: 0 auto; width: 100%; }
    .exam-hero { text-align: center; padding: var(--space-8) 0 var(--space-4); }
    .exam-hero h1 { font-size: var(--text-3xl); color: var(--heading); margin-bottom: var(--space-2); }
    .exam-hero p { color: var(--muted); }
    .exam-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-4); margin: var(--space-6) 0; }
    @media (max-width: 500px) { .exam-grid { grid-template-columns: repeat(3,1fr); gap: var(--space-2); } }
    .exam-card {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: var(--space-6) var(--space-4); border-radius: var(--radius-xl);
      background: var(--surface); border: 1px solid var(--border);
      text-decoration: none; color: var(--body); transition: all var(--transition-fast); gap: var(--space-3);
    }
    .exam-card:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); transform: translateY(-3px); }
    .exam-card-icon { width: 56px; height: 56px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
    .exam-card-label { font-weight: 700; font-size: var(--text-lg); color: var(--heading); }
    .exam-card-desc { font-size: var(--text-xs); color: var(--muted); }
    body.dark .exam-card { background: var(--dark-card); border-color: var(--dark-border); }
  </style>
</head>
