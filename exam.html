<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>পরীক্ষা - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .exam-page { max-width: 600px; margin: 0 auto; width: 100%; }
    .exam-page h2 { font-size: var(--text-2xl); font-weight: 700; color: var(--heading); margin-bottom: var(--sp4); text-align: center; }
    .exam-cards { display: flex; flex-direction: column; gap: var(--sp2); }
    .exam-card { display: flex; align-items: center; justify-content: space-between; padding: var(--sp4) var(--sp3); border-radius: var(--r-md); background: var(--surface); border: 1px solid var(--border); text-decoration: none; color: var(--body); transition: all var(--tr-base); box-shadow: var(--sh-sm); }
    .exam-card:hover { box-shadow: var(--sh-lg); border-color: var(--primary); transform: scale(1.02); }
    .exam-card-left { display: flex; flex-direction: column; }
    .exam-card-label { font-weight: 700; font-size: var(--text-xl); color: var(--heading); }
    .exam-card-desc { font-size: var(--text-xs); color: var(--muted); margin-top: 2px; }
    .exam-card-arrow { color: var(--primary); font-size: 1.4rem; font-weight: 700; }
    .exam-card.mcq { border-left: 4px solid #22C55E; }
    .exam-card.cq { border-left: 4px solid #3B82F6; }
    .exam-card.sq { border-left: 4px solid #F59E0B; }
    .exam-card.model { border-left: 4px solid var(--accent); }
    body.dark .exam-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .exam-card-label { color: var(--dark-heading); }
  </style>
</head>
<body>
