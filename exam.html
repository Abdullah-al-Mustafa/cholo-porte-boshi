<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>পরীক্ষা - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0D1B2A"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .exam-page { max-width: 600px; margin: 0 auto; width: 100%; }
    .exam-page h2 { font-size: var(--text-2xl); font-weight: 700; color: var(--heading); margin-bottom: var(--space-6); }
    .exam-cards { display: flex; flex-direction: column; gap: var(--space-4); }
    .exam-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-5) var(--space-6); border-radius: var(--radius-xl);
      background: var(--surface); border: 1px solid var(--border);
      text-decoration: none; color: var(--body); transition: all var(--transition-fast);
    }
    .exam-card:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); transform: translateX(4px); }
    .exam-card-left { display: flex; flex-direction: column; }
    .exam-card-label { font-weight: 700; font-size: var(--text-xl); color: var(--heading); }
    .exam-card-desc { font-size: var(--text-xs); color: var(--muted); margin-top: 2px; }
    .exam-card-arrow { color: var(--accent); font-size: 1.5rem; font-weight: 700; }
    .exam-card.mcq { border-left: 4px solid #22C55E; }
    .exam-card.cq { border-left: 4px solid #3B82F6; }
    .exam-card.sq { border-left: 4px solid #F59E0B; }
    .exam-card.model { border-left: 4px solid var(--accent); }
    .footer { text-align: center; padding: var(--space-4); background: var(--primary); color: rgba(255,255,255,0.7); font-size: var(--text-xs); width: 100%; flex-shrink: 0; }
    body.dark .exam-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .exam-card-label { color: var(--dark-heading); }
    body.dark .footer { background: #0A0F17; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner" style="justify-content:center;">
      <span style="font-weight:700;font-size:clamp(1.1rem,3vw,1.3rem);color:var(--accent);">পরীক্ষা</span>
    </div>
  </header>
  <main class="main-content">
    <div class="exam-page">
      <h2>নিজেকে যাচাই করো</h2>
      <div class="exam-cards">
        <a href="mcq-test.html" class="exam-card mcq">
          <div class="exam-card-left"><span class="exam-card-label">MCQ</span><span class="exam-card-desc">বহুনির্বাচনি প্রশ্নোত্তর</span></div>
          <span class="exam-card-arrow">→</span>
        </a>
        <a href="cq-test.html" class="exam-card cq">
          <div class="exam-card-left"><span class="exam-card-label">CQ</span><span class="exam-card-desc">সৃজনশীল প্রশ্নোত্তর</span></div>
          <span class="exam-card-arrow">→</span>
        </a>
        <a href="sq-test.html" class="exam-card sq">
          <div class="exam-card-left"><span class="exam-card-label">SQ</span><span class="exam-card-desc">সংক্ষিপ্ত প্রশ্নোত্তর</span></div>
          <span class="exam-card-arrow">→</span>
        </a>
        <a href="model-test.html" class="exam-card model">
          <div class="exam-card-left"><span class="exam-card-label">মডেল টেস্ট</span><span class="exam-card-desc">পূর্ণাঙ্গ পরীক্ষা</span></div>
          <span class="exam-card-arrow">→</span>
        </a>
      </div>
    </div>
  </main>
