<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ক্যালকুলেটর - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .calc-page { max-width: 450px; margin: 0 auto; width: 100%; }
    .type-selector { display: flex; gap: var(--sp1); margin-bottom: var(--sp3); flex-wrap: wrap; }
    .type-chip { padding: 6px 14px; border-radius: var(--r-full); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: var(--text-xs); font-weight: 500; transition: all var(--tr-fast); white-space: nowrap; font-family: var(--font); }
    .type-chip:hover, .type-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .calc-display { width: 100%; padding: var(--sp4); font-size: 1.8rem; text-align: right; border: 2px solid var(--border); border-radius: var(--r-md); margin-bottom: var(--sp3); background: var(--surface); color: var(--heading); font-family: monospace; min-height: 60px; word-break: break-all; }
    .calc-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: var(--sp1); }
    .calc-btn { padding: var(--sp3); font-size: 1.15rem; font-weight: 600; border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; background: var(--surface); color: var(--heading); transition: all var(--tr-fast); font-family: var(--font); }
    .calc-btn:hover { background: var(--secondary); }
    .calc-btn.op { color: var(--primary); font-weight: 700; }
    .calc-btn.eq { background: var(--primary); color: white; }
    .calc-btn.func { color: var(--accent); font-weight: 600; }
    .scientific-keys { display: none; }
    .scientific-keys.show { display: grid; }
    body.dark .calc-display { background: var(--dark-surface); color: var(--dark-heading); border-color: var(--dark-border); }
    body.dark .calc-btn { background: var(--dark-surface); color: var(--dark-heading); border-color: var(--dark-border); }
    body.dark .type-chip { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">Calculator</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="calc-page">
      <div class="type-selector">
        <button class="type-chip active" onclick="switchCalc('normal', this)">সাধারণ</button>
        <button class="type-chip" onclick="switchCalc('scientific', this)">বৈজ্ঞানিক</button>
        <button class="type-chip" onclick="switchCalc('algebra', this)">বীজগণিত</button>
        <button class="type-chip" onclick="switchCalc('geometry', this)">জ্যামিতি</button>
      </div>
      <div class="calc-display" id="calcDisplay">0</div>
      <div class="calc-grid" id="calcKeys"></div>
    </div>
  </main>
