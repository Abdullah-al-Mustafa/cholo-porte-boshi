<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ক্যালকুলেটর - পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .calc-page { max-width:500px; margin:0 auto; width:100%; }
    .calc-page h2 { font-size:var(--text-2xl); font-weight:700; color:var(--heading); text-align:center; margin-bottom:var(--sp3); }
    .type-bar { display:flex; gap:var(--sp1); margin-bottom:var(--sp4); flex-wrap:wrap; justify-content:center; }
    .type-chip { padding:8px 16px; border-radius:var(--r-full); border:1.5px solid var(--border); background:var(--surface); cursor:pointer; font-size:0.85rem; font-weight:600; transition:all var(--tr-fast); font-family:var(--font); }
    .type-chip.active { background:var(--primary-green); color:white; border-color:var(--primary-green); }
    .display { background:var(--surface); border:2px solid var(--border); border-radius:var(--r-md); padding:var(--sp4); font-size:2rem; text-align:right; margin-bottom:var(--sp3); min-height:72px; word-break:break-all; font-family:monospace; color:var(--heading); }
    .keys { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp1); }
    .key { padding:var(--sp3); font-size:1.1rem; font-weight:600; border:1.5px solid var(--border); border-radius:var(--r-sm); background:var(--surface); cursor:pointer; text-align:center; transition:all var(--tr-fast); font-family:var(--font); color:var(--body); }
    .key:hover { background:var(--secondary); border-color:var(--primary-green); }
    .key.op { color:var(--primary-green); font-weight:700; }
    .key.eq { background:var(--primary-green); color:white; border-color:var(--primary-green); font-weight:700; }
    .key.func { color:var(--accent); font-weight:600; }
    .key.clear { color:#DC2626; }
    body.dark .display { background:var(--dark-surface); border-color:var(--dark-border); color:var(--dark-heading); }
    body.dark .key { background:var(--dark-surface); border-color:var(--dark-border); color:var(--dark-body); }
    body.dark .type-chip { background:var(--dark-surface); border-color:var(--dark-border); color:var(--dark-body); }
    body.dark .type-chip.active { background:var(--primary-green); color:white; }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="tools.html" class="icon-btn" aria-label="Back"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a><span style="color:white;font-weight:600;" data-t="calculator">ক্যালকুলেটর</span><span style="width:28px;"></span></div></header>
  <main class="main-content">
    <div class="calc-page">
      <div class="type-bar" id="typeBar">
        <button class="type-chip active" onclick="switchCalc('basic')">সাধারণ</button>
        <button class="type-chip" onclick="switchCalc('scientific')">বৈজ্ঞানিক</button>
        <button class="type-chip" onclick="switchCalc('algebra')">বীজগণিত</button>
        <button class="type-chip" onclick="switchCalc('geometry')">জ্যামিতি</button>
      </div>
      <div class="display" id="display">0</div>
      <div class="keys" id="keys"></div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span data-t="home">হোম</span></a>
    <a href="model-test.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span data-t="exam">পরীক্ষা</span></a>
    <a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">AI</span><span data-t="ai">এআই</span></a>
    <a href="tools.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span data-t="tools">টুলস</span></a>
  </nav>
  <script>
    let expression = '';
    let currentType = 'basic';
    const display = document.getElementById('display');
    const keysContainer = document.getElementById('keys');

    const keySets = {
      basic: [
        ['C','(',')','÷'], ['7','8','9','×'], ['4','5','6','−'], ['1','2','3','+'], ['0','.','⌫','=']
      ],
      scientific: [
        ['sin','cos','tan','÷'], ['log','ln','√','×'], ['x²','x³','π','−'], ['7','8','9','+'], ['4','5','6','='], ['1','2','3','.'], ['0','C','(',')']
      ],
      algebra: [
        ['x²','x³','√','÷'], ['(','x',')','×'], ['a','b','c','−'], ['7','8','9','+'], ['4','5','6','='], ['1','2','3','.'], ['0','C','π','e']
      ],
      geometry: [
        ['π','r','d','÷'], ['sin','cos','tan','×'], ['√','°','²','−'], ['7','8','9','+'], ['4','5','6','='], ['1','2','3','.'], ['0','C','(',')']
      ]
    };

    function switchCalc(type) {
      currentType = type;
      document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      renderKeys(type);
      clearDisplay();
    }

    function renderKeys(type) {
      const keys = keySets[type] || keySets.basic;
      keysContainer.innerHTML = keys.map(row => row.map(k => {
        let cls = 'key';
        if (['÷','×','−','+'].includes(k)) cls += ' op';
        if (k === '=') cls += ' eq';
        if (['sin','cos','tan','log','ln','√','x²','x³','π','e','°'].includes(k)) cls += ' func';
        if (k === 'C') cls += ' clear';
        return `<button class="${cls}" onclick="pressKey('${k}')">${k}</button>`;
      }).join('')).join('');
    }

    function pressKey(k) {
      if (k === 'C') { clearDisplay(); return; }
      if (k === '⌫') { expression = expression.slice(0, -1); display.textContent = expression || '0'; return; }
      if (k === '=') { calculate(); return; }
      expression += k;
      display.textContent = expression;
    }

    function clearDisplay() { expression = ''; display.textContent = '0'; }

    function calculate() {
      try {
        let exp = expression
          .replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')
          .replace(/π/g, 'Math.PI').replace(/e/g, 'Math.E')
          .replace(/√/g, 'Math.sqrt')
          .replace(/sin/g, 'Math.sin(').replace(/cos/g, 'Math.cos(').replace(/tan/g, 'Math.tan(')
          .replace(/log/g, 'Math.log10(').replace(/ln/g, 'Math.log(')
          .replace(/x²/g, '**2').replace(/x³/g, '**3')
          .replace(/²/g, '**2').replace(/³/g, '**3');
        let result = eval(exp);
        display.textContent = result;
        expression = String(result);
      } catch { display.textContent = 'Error'; expression = ''; }
    }

    renderKeys('basic');
  </script>
<script src="js/lang.js"></script>
</body>
</html>
