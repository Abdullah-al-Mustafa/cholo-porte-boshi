<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ট্রান্সলেটর - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .trans-page { max-width: 600px; margin: 0 auto; width: 100%; }
    .lang-selector { display: flex; gap: var(--sp1); margin-bottom: var(--sp3); align-items: center; }
    .lang-selector select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--r-md); font-family: var(--font); background: var(--surface); color: var(--body); }
    .lang-selector span { color: var(--muted); font-weight: 600; }
    .trans-page textarea { width: 100%; padding: var(--sp3); border: 2px solid var(--border); border-radius: var(--r-md); font-family: var(--font); font-size: var(--text-base); min-height: 120px; resize: vertical; background: var(--surface); color: var(--body); }
    .trans-page button { margin-top: var(--sp3); width: 100%; }
    .output-box { margin-top: var(--sp3); padding: var(--sp3); border: 1px solid var(--border); border-radius: var(--r-md); min-height: 80px; background: var(--surface); color: var(--body); font-size: var(--text-base); }
    body.dark textarea, body.dark .output-box, body.dark select { background: var(--dark-surface); color: var(--dark-body); border-color: var(--dark-border); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">Translator</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="trans-page">
      <div class="lang-selector">
        <select id="fromLang"><option value="bn">বাংলা</option><option value="en">English</option><option value="ar">العربية</option><option value="hi">हिन्दी</option></select>
        <span>→</span>
        <select id="toLang"><option value="en">English</option><option value="bn">বাংলা</option><option value="ar">العربية</option><option value="hi">हिन्दी</option></select>
      </div>
      <textarea id="transInput" placeholder="টেক্সট লিখুন..."></textarea>
      <button class="btn btn-primary" onclick="translateText()">অনুবাদ করুন</button>
      <div class="output-box" id="transOutput"></div>
    </div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>সেটিংস</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a></nav>
  <script>
    async function translateText() {
      const text = document.getElementById('transInput').value.trim();
      if (!text) return;
      const from = document.getElementById('fromLang').value;
      const to = document.getElementById('toLang').value;
      document.getElementById('transOutput').textContent = 'অনুবাদ করা হচ্ছে...';
      try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        const translated = data[0].map(item => item[0]).join('');
        document.getElementById('transOutput').textContent = translated || 'অনুবাদ করা যায়নি';
      } catch(e) {
        document.getElementById('transOutput').textContent = 'অনুবাদ করা যায়নি। আবার চেষ্টা করুন।';
      }
    }
  </script>
</body>
</html>
