<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ট্রান্সলেটর - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .trans-page { max-width: 600px; margin: 0 auto; width: 100%; }
    .lang-selector { display: flex; gap: var(--sp1); margin-bottom: var(--sp3); align-items: center; }
    .lang-selector select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--r-md); font-family: var(--font); background: var(--surface); color: var(--body); }
    .lang-selector span { color: var(--muted); font-weight: 600; }
    .trans-page textarea { width: 100%; padding: var(--sp3); border: 2px solid var(--border); border-radius: var(--r-md); font-family: var(--font); font-size: var(--text-base); min-height: 120px; resize: vertical; background: var(--surface); color: var(--body); }
    .trans-page button { margin-top: var(--sp3); width: 100%; }
    .output-box { margin-top: var(--sp3); padding: var(--sp3); border: 1px solid var(--border); border-radius: var(--r-md); min-height: 80px; background: var(--surface); color: var(--body); font-size: var(--text-base); }
    body.dark textarea, body.dark .output-box, body.dark select { background: var(--dark-surface); color: var(--dark-body); border-color: var(--dark-border); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">Translator</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="trans-page">
      <div class="lang-selector">
        <select id="fromLang">
          <option value="bn">বাংলা</option>
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="hi">हिन्दी</option>
          <option value="ur">اردو</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="de">Deutsch</option>
          <option value="zh-CN">中文 (简体)</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
        </select>
        <span>→</span>
        <select id="toLang">
          <option value="en">English</option>
          <option value="bn">বাংলা</option>
          <option value="ar">العربية</option>
          <option value="hi">हिन्दी</option>
          <option value="ur">اردو</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="de">Deutsch</option>
          <option value="zh-CN">中文 (简体)</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
        </select>
      </div>
      <textarea id="transInput" placeholder="টেক্সট লিখুন..."></textarea>
      <button class="btn btn-primary" onclick="translateText()">অনুবাদ করুন</button>
      <div class="output-box" id="transOutput"></div>
    </div>
  </main>
