<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ভিডিও - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .videos-page { max-width: 900px; margin: 0 auto; width: 100%; }
    .filter-bar { display: flex; gap: var(--sp1); margin-bottom: var(--sp4); flex-wrap: wrap; }
    .filter-chip { padding: 6px 14px; border-radius: var(--r-full); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: var(--text-xs); font-weight: 500; transition: all var(--tr-fast); white-space: nowrap; font-family: var(--font); }
    .filter-chip:hover, .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp2); }
    @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 400px) { .card-grid { grid-template-columns: 1fr; } }
    .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; cursor: pointer; transition: all var(--tr-base); box-shadow: var(--sh-sm); }
    .video-card:hover { box-shadow: var(--sh-lg); border-color: var(--secondary-hover); transform: scale(1.02); }
    .video-card .thumb { height: 160px; background-size: cover; background-position: center; background-color: #0A1F12; position: relative; }
    .video-card .thumb .v-label { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.75); color: white; font-size: 9px; padding: 4px 10px; border-radius: var(--r-full); z-index: 1; font-weight: 600; }
    .video-card .body { padding: var(--sp3); }
    .video-card .body h4 { font-size: var(--text-sm); font-weight: 600; color: var(--heading); margin-bottom: 6px; }
    .video-card .body .meta { font-size: var(--text-xs); color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .badge.class { background: var(--primary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary-dark); }
    body.dark .video-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .video-card .body h4 { color: var(--dark-heading); }
    body.dark .filter-chip { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">ভিডিও</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="videos-page">
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" onclick="filterVideos('All', this)">All</button>
        <button class="filter-chip" onclick="filterVideos('9-10', this)">Class 9-10</button>
        <button class="filter-chip" onclick="filterVideos('8', this)">Class 8</button>
        <button class="filter-chip" onclick="filterVideos('7', this)">Class 7</button>
        <button class="filter-chip" onclick="filterVideos('6', this)">Class 6</button>
      </div>
      <div class="card-grid" id="videosList"><p class="text-muted">লোড হচ্ছে...</p></div>
    </div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>সেটিংস</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a></nav>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    let allVideos = [];
    function getThumb(url) { if (!url) return ''; let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/); if (m) return { url: 'https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg', label: 'YouTube' }; if (url.includes('facebook.com')||url.includes('fb.watch')) return { url: '', label: 'Facebook' }; if (url.includes('vimeo.com')) return { url: '', label: 'Vimeo' }; if (url.includes('drive.google.com')) return { url: '', label: 'Drive' }; return { url: '', label: 'Video' }; }
    function clsBadge(c) { if (!c || c === 'All' || c === 'all') return '<span class="badge all">For All</span>'; const map = { '6': 'Class 6', '7': 'Class 7', '8': 'Class 8', '9-10': 'Class 9-10' }; return `<span class="badge class">For ${map[c] || c}</span>`; }

    async function loadVideos() {
      const s = await db.collection('videos').orderBy('createdAt','desc').get();
      allVideos = s.docs.map(d => ({ id: d.id, ...d.data() }));
      renderVideos(allVideos);
    }

    function renderVideos(data) {
      document.getElementById('videosList').innerHTML = data.length ? data.map(d => { const t = getThumb(d.url||''); return `<div class="video-card" onclick="window.open('${d.url}','_blank')"><div class="thumb" style="${t.url?'background-image:url('+t.url+');':'background-color:#0A1F12;'}"><span class="v-label">${t.label}</span></div><div class="body"><h4>${d.title}</h4><div class="meta">${clsBadge(d.class)} ${d.subject||''}</div></div></div>`; }).join('') : '<p class="text-muted">কোনো ভিডিও নেই</p>';
    }

    function filterVideos(cls, el) {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      const filtered = cls === 'All' ? allVideos : allVideos.filter(v => v.class === cls);
      renderVideos(filtered);
    }

    loadVideos();
  </script>
</body>
</html>
