<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ভিডিও - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0D1B2A"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .videos-page { max-width: 900px; margin: 0 auto; width: 100%; }
    .video-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: var(--space-4); }
    @media (min-width: 600px) { .video-grid { grid-template-columns: repeat(3,1fr); } }
    .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; cursor: pointer; transition: all var(--transition-fast); }
    .video-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent); }
    .video-thumb { height: 140px; background-color: #1a1a2e; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; position: relative; }
    .video-thumb .play-icon { width: 44px; height: 44px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .video-thumb .play-icon svg { width: 20px; height: 20px; fill: white; }
    .video-thumb .video-label { position: absolute; bottom: 6px; right: 8px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .video-info { padding: var(--space-4); }
    .video-info h4 { font-size: var(--text-sm); color: var(--heading); margin-bottom: 4px; }
    .video-info p { font-size: var(--text-xs); color: var(--muted); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; font-weight: 600; }
    .badge.class { background: var(--secondary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary); }
    body.dark .video-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .video-info h4 { color: var(--dark-heading); }
  </style>
</head>
