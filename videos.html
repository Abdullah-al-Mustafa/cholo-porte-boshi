<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ভিডিও - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .videos-page { max-width: 900px; margin: 0 auto; width: 100%; }
    .filter-bar { display: flex; gap: var(--sp1); margin-bottom: var(--sp4); flex-wrap: wrap; }
    .filter-chip { padding: 6px 14px; border-radius: var(--r-full); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: var(--text-xs); font-weight: 500; transition: all var(--tr-fast); white-space: nowrap; font-family: var(--font); }
    .filter-chip:hover, .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp2); }
    @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 400px) { .card-grid { grid-template-columns: 1fr; } }
    .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; cursor: pointer; transition: all var(--tr-base); box-shadow: var(--sh-sm); }
    .video-card:hover { box-shadow: var(--sh-lg); border-color: var(--secondary-hover); transform: scale(1.02); }
    .video-card .thumb { height: 160px; background-size: cover; background-position: center; background-color: #0A1F12; position: relative; }
    .video-card .thumb .v-label { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.75); color: white; font-size: 9px; padding: 4px 10px; border-radius: var(--r-full); z-index: 1; font-weight: 600; }
    .video-card .body { padding: var(--sp3); }
    .video-card .body h4 { font-size: var(--text-sm); font-weight: 600; color: var(--heading); margin-bottom: 6px; }
    .video-card .body .meta { font-size: var(--text-xs); color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .badge.class { background: var(--primary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary-dark); }
    body.dark .video-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .video-card .body h4 { color: var(--dark-heading); }
    body.dark .filter-chip { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
  </style>
</head>
<body>
