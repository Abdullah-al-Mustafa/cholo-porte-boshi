<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>সার্চ - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .search-page { max-width: 700px; margin: 0 auto; width: 100%; }
    .search-bar-wrap { position: relative; margin-bottom: var(--sp5); }
    .search-bar-wrap input {
      width: 100%; padding: 16px 48px 16px 20px; border: 2px solid var(--border);
      border-radius: var(--r-lg); font-size: var(--text-lg); font-family: var(--font);
      outline: none; background: var(--surface); color: var(--body);
      transition: all var(--tr-fast); box-shadow: var(--sh-sm);
    }
    .search-bar-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(21,128,61,0.08); }
    .search-bar-wrap input::placeholder { color: var(--muted); }
    .search-bar-wrap .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-bar-wrap .search-icon svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; stroke-width: 1.8; }

    .result-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: var(--sp3); margin-bottom: var(--sp1); cursor: pointer;
      transition: all var(--tr-fast); display: flex; align-items: center; gap: var(--sp2);
    }
    .result-card:hover { border-color: var(--primary); box-shadow: var(--sh-md); }
    .result-icon { font-size: 1.2rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: var(--r-sm); flex-shrink: 0; }
    .result-info { flex: 1; min-width: 0; }
    .result-info h4 { font-size: var(--text-sm); font-weight: 600; color: var(--heading); margin-bottom: 2px; }
    .result-info p { font-size: var(--text-xs); color: var(--muted); }
    .result-badge { display: inline-block; padding: 2px 8px; border-radius: var(--r-full); font-size: 9px; font-weight: 600; }
    .result-badge.video { background: #FEE2E2; color: #DC2626; }
    .result-badge.article { background: #DBEAFE; color: #2563EB; }
    .result-badge.question { background: #DCFCE7; color: #166534; }

    .empty-state { text-align: center; padding: var(--sp10) var(--sp3); }
    .empty-state p { color: var(--muted); font-size: var(--text-lg); }
    .empty-state span { color: var(--primary); font-weight: 600; }

    body.dark .search-bar-wrap input { background: var(--dark-surface); color: var(--dark-body); border-color: var(--dark-border); }
    body.dark .result-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .result-info h4 { color: var(--dark-heading); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">সার্চ</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="search-page">
      <div class="search-bar-wrap">
        <input type="text" placeholder="কী খুঁজতে চাও?" id="searchInput" oninput="doSearch()">
        <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      </div>
      <div id="results"><div class="empty-state"><p>কিছু লিখে সার্চ করো</p></div></div>
    </div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>সেটিংস</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a></nav>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    let allData = [];

    async function loadData() {
      const [v, a, q] = await Promise.all([
        db.collection('videos').orderBy('createdAt','desc').get(),
        db.collection('articles').orderBy('createdAt','desc').get(),
        db.collection('questions').orderBy('createdAt','desc').get()
      ]);
      allData = [
        ...v.docs.map(d => ({ type: 'video', title: d.data().title, class: d.data().class, subject: d.data().subject, url: d.data().url })),
        ...a.docs.map(d => ({ type: 'article', title: d.data().title, class: d.data().class, subject: d.data().subject, id: d.id })),
        ...q.docs.map(d => ({ type: 'question', title: d.data().question?.substring(0,60), class: d.data().class, subject: d.data().subject }))
      ];
    }
    loadData();

    function doSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const res = document.getElementById('results');
      if (!q) { res.innerHTML = '<div class="empty-state"><p>কিছু লিখে সার্চ করো</p></div>'; return; }
      const filtered = allData.filter(d => 
        (d.title||'').toLowerCase().includes(q) || (d.subject||'').toLowerCase().includes(q) || (d.class||'').includes(q)
      );
      if (!filtered.length) { res.innerHTML = '<div class="empty-state"><p>কোনো ফলাফল পাওয়া যায়নি</p><span>CPB AI-কে জিজ্ঞেস করো</span></div>'; return; }
      res.innerHTML = filtered.slice(0, 10).map(d => {
        const iconMap = { video: '▶️', article: '📄', question: '❓' };
        const badgeClass = d.type === 'video' ? 'video' : d.type === 'article' ? 'article' : 'question';
        const onClick = d.type === 'video' ? `window.open('${d.url}','_blank')` : d.type === 'article' ? `location.href='article.html?id=${d.id}'` : '';
        return `<div class="result-card" onclick="${onClick}"><div class="result-icon" style="background:var(--secondary);">${iconMap[d.type]}</div><div class="result-info"><h4>${d.title}</h4><p><span class="result-badge ${badgeClass}">${d.type.toUpperCase()}</span> ${d.class||''} • ${d.subject||''}</p></div></div>`;
      }).join('');
    }
  </script>
</body>
</html>
