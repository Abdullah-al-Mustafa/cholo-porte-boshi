    .articles-page { max-width: 800px; margin: 0 auto; width: 100%; }
    .article-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; margin-bottom: var(--space-4); cursor: pointer; transition: all var(--transition-fast); }
    .article-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent); }
    .article-img { height: 180px; background-size: cover; background-position: center; background-color: var(--accent-light); }
    .article-body { padding: var(--space-5); }
    .article-body h3 { color: var(--heading); margin-bottom: var(--space-2); }
    .article-body .meta { font-size: var(--text-xs); color: var(--muted); margin-bottom: var(--space-2); display: flex; gap: 4px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; font-weight: 600; }
    .badge.subject { background: var(--accent-light); color: var(--primary); }
    .badge.class { background: var(--secondary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary); }
    body.dark .article-card { background: var(--dark-card); border-color: var(--dark-border); }
  </style>
