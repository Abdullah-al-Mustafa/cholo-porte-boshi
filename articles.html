<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>আর্টিকেল - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .articles-page { max-width: 900px; margin: 0 auto; width: 100%; }
    .filter-bar { display: flex; gap: var(--sp1); margin-bottom: var(--sp4); flex-wrap: wrap; }
    .filter-chip { padding: 6px 14px; border-radius: var(--r-full); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: var(--text-xs); font-weight: 500; transition: all var(--tr-fast); white-space: nowrap; font-family: var(--font); }
    .filter-chip:hover, .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp2); }
    @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 400px) { .card-grid { grid-template-columns: 1fr; } }
    .article-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; cursor: pointer; transition: all var(--tr-base); box-shadow: var(--sh-sm); }
    .article-card:hover { box-shadow: var(--sh-lg); border-color: var(--secondary-hover); transform: scale(1.02); }
    .article-card .thumb { height: 160px; background-size: cover; background-position: center; background-color: var(--secondary); }
    .article-card .body { padding: var(--sp3); }
    .article-card .body h4 { font-size: var(--text-sm); font-weight: 600; color: var(--heading); margin-bottom: 6px; line-height: 1.4; }
    .article-card .body .meta { font-size: var(--text-xs); color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .badge.subject { background: var(--secondary); color: var(--primary); }
    .badge.class { background: var(--primary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary-dark); }
    body.dark .article-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .article-card .body h4 { color: var(--dark-heading); }
    body.dark .filter-chip { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">আর্টিকেল</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="articles-page">
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" onclick="filterArticles('All', this)">All</button>
        <button class="filter-chip" onclick="filterArticles('9-10', this)">Class 9-10</button>
        <button class="filter-chip" onclick="filterArticles('8', this)">Class 8</button>
        <button class="filter-chip" onclick="filterArticles('7', this)">Class 7</button>
        <button class="filter-chip" onclick="filterArticles('6', this)">Class 6</button>
      </div>
      <div class="card-grid" id="articlesList"><p class="text-muted">লোড হচ্ছে...</p></div>
    </div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>সেটিংস</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a></nav>
    <a href="community.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span>Community</span></a>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    let allArticles = [];
    function clsBadge(c) { if (!c || c === 'All' || c === 'all') return '<span class="badge all">For All</span>'; const map = { '6': 'Class 6', '7': 'Class 7', '8': 'Class 8', '9-10': 'Class 9-10' }; return `<span class="badge class">For ${map[c] || c}</span>`; }

    async function loadArticles() {
      const s = await db.collection('articles').orderBy('createdAt','desc').get();
      allArticles = s.docs.map(d => ({ id: d.id, ...d.data() }));
      renderArticles(allArticles);
    }

    function renderArticles(data) {
      document.getElementById('articlesList').innerHTML = data.length ? data.map(d => { const img = d.image; return `<div class="article-card" onclick="location.href='article.html?id=${d.id}'"><div class="thumb" style="${img?'background-image:url('+img+');':'background:var(--secondary);'}"></div><div class="body"><span class="badge subject">${d.subject||'সাধারণ'}</span><h4>${d.title}</h4><div class="meta">${clsBadge(d.class)}</div></div></div>`; }).join('') : '<p class="text-muted">কোনো আর্টিকেল নেই</p>';
    }

    function filterArticles(cls, el) {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      const filtered = cls === 'All' ? allArticles : allArticles.filter(a => a.class === cls);
      renderArticles(filtered);
    }

    loadArticles();
  </script>
</body>
</html>
