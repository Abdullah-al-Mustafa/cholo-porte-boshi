<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>মেনু - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0D1B2A"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .menu-page { max-width: 800px; margin: 0 auto; width: 100%; }
    .menu-section { margin-bottom: var(--space-6); }
    .menu-section-title { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: var(--space-3); padding-left: var(--space-1); }
    .menu-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: var(--space-3); }
    @media (min-width: 600px) { .menu-grid { grid-template-columns: repeat(3,1fr); } }
    .menu-card { display: flex; flex-direction: column; align-items: center; text-align: center; padding: var(--space-5) var(--space-3); border-radius: var(--radius-xl); background: var(--surface); border: 1px solid var(--border); text-decoration: none; color: var(--body); transition: all var(--transition-fast); gap: var(--space-2); }
    .menu-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent); transform: translateY(-2px); }
    .menu-card-icon { width: 48px; height: 48px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .menu-card-label { font-weight: 600; font-size: var(--text-sm); color: var(--heading); }
    .menu-card-desc { font-size: var(--text-xs); color: var(--muted); }
    body.dark .menu-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .menu-card-label { color: var(--dark-heading); }
  </style>
</head>
<body>
