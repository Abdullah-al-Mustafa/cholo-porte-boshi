  <style>
    .hero {
      background: linear-gradient(135deg, #15803D 0%, #166534 100%);
      border-radius: 0 0 32px 32px; padding: 52px 24px 44px;
      text-align: center; color: white; margin-bottom: var(--sp8);
    }
    .hero h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 8px; color: white; }
    .hero p { opacity: 0.9; font-size: 1.05rem; color: white; }
    .section-title { font-size: 1.2rem; font-weight: 700; padding: 8px 24px 16px; letter-spacing: -0.01em; color: var(--muted); text-transform: uppercase; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 28px; margin-bottom: var(--sp8); padding: 0 24px; }
    @media (max-width:400px) { .card-grid { grid-template-columns: 1fr; } }
    .mini-card {
      background: var(--surface); border: 1.5px solid #E2E8F0; border-radius: 24px;
      padding: 36px 20px 32px; text-align: center; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      box-shadow: 0 6px 12px -4px rgba(0, 0, 0, 0.07);
      text-decoration: none; color: var(--body); display: flex;
      flex-direction: column; align-items: center; gap: var(--sp2);
    }
    .mini-card:hover {
      border-color: #15803D; transform: translateY(-12px);
      box-shadow: 0 30px 35px -12px rgba(21, 128, 61, 0.2);
    }
    .mini-card .card-icon {
      width: 80px; height: 80px; border-radius: 22px;
      background: #ECFDF5; display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px; transition: all 0.2s ease;
    }
    .mini-card:hover .card-icon { background: #C6F6D5; transform: scale(1.15); }
    .mini-card .card-icon svg { width: 38px; height: 38px; stroke: var(--primary-green); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .mini-card h4 { font-size: 1.12rem; font-weight: 600; line-height: 1.3; color: var(--heading); margin: 0; }
    body.dark .mini-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .mini-card h4 { color: var(--dark-heading); }
    body.dark .mini-card .card-icon { background: rgba(134,239,172,0.15); }
    body.dark .mini-card .card-icon svg { stroke: var(--light-green); }
  </style>
