  <style>
    .video-thumb {
      height: 130px; border-radius: var(--radius-lg); background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-3);
      position: relative; overflow: hidden;
    }
    .video-thumb .play-icon {
      width: 40px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .video-thumb .play-icon svg { width: 18px; height: 18px; fill: white; stroke: none; }
  </style>
</head>
<body>

    <div class="header-inner">
      <a href="menu.html" class="icon-btn mobile-only"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></a>
      <a href="index.html" class="header-brand">চলো পড়তে বসি</a>
      <nav class="header-nav">
        <a href="index.html" class="active">হোম</a>
        <a href="articles.html">আর্টিকেল</a>
        <a href="videos.html">ভিডিও</a>

        <a href="cpb-ai.html">CPB AI</a>
      </nav>
      <a href="search.html" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></a>
    </div>
  </header>

  <main class="main-content">
    <section class="hero">
      <h1>চলো পড়তে বসি</h1>
      <p>A Bangladesh Curriculum-Based Learning Platform</p>
      <div class="hero-actions">
        <a href="cpb-ai.html" class="btn btn-primary btn-lg">CPB AI</a>
        <a href="exam.html" class="btn btn-outline btn-lg" style="border-color:white; color:white; display:inline-flex;align-items:center;gap:8px;">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg> পরীক্ষা
        </a>
      </div>
    </section>

    <section class="section">
      <div class="section-header"><h2 class="section-title">ভিডিও</h2><a href="videos.html" class="section-link">সব ভিডিও</a></div>
      <div id="homeVideos" class="horizontal-scroll"><p class="text-muted">লোড হচ্ছে...</p></div>
    </section>

    <section class="section">
      <div class="section-header"><h2 class="section-title">আর্টিকেল</h2><a href="articles.html" class="section-link">সব আর্টিকেল</a></div>
      <div id="homeArticles" class="horizontal-scroll"><p class="text-muted">লোড হচ্ছে...</p></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();

    function getYouTubeThumb(url) {
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return match ? `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg` : '';
    }

    async function loadHome() {
      const vSnap = await db.collection('videos').orderBy('createdAt', 'desc').limit(4).get();
      const vDiv = document.getElementById('homeVideos');
      if (vSnap.empty) { vDiv.innerHTML = '<p class="text-muted">কোনো ভিডিও নেই</p>'; }
      else {
        vDiv.innerHTML = vSnap.docs.map(doc => {
          const d = doc.data();
          const thumb = getYouTubeThumb(d.url || '');
          const bgStyle = thumb ? `background-image:url(${thumb});` : 'background:var(--accent-light);';
          return `<div class="card card-clickable" style="min-width:260px;padding:0;overflow:hidden;" onclick="window.open('${d.url}','_blank')">
            <div class="video-thumb" style="${bgStyle}"><div class="play-icon"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div></div>
            <div style="padding:var(--space-4);"><h4>${d.title}</h4><p class="text-muted">ক্লাস ${d.class} • ${d.subject || ''}</p></div>
          </div>`;
        }).join('');
      }

      const aSnap = await db.collection('articles').orderBy('createdAt', 'desc').limit(4).get();
      const aDiv = document.getElementById('homeArticles');
      if (aSnap.empty) { aDiv.innerHTML = '<p class="text-muted">কোনো আর্টিকেল নেই</p>'; }
      else {
        aDiv.innerHTML = aSnap.docs.map(doc => {
          const d = doc.data();
          return `<div class="card card-clickable" style="min-width:280px;"><span style="display:inline-block;padding:2px 10px;background:var(--accent-light);color:var(--primary);border-radius:var(--radius-full);font-size:11px;font-weight:600;margin-bottom:var(--space-2);">${d.subject || ''}</span><h4>${d.title}</h4><p class="text-muted">ক্লাস ${d.class}</p></div>`;
        }).join('');
      }
    }
    loadHome();
  </script>
</body>
</html>
