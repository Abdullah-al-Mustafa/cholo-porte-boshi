<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>চলো পড়তে বসি</title><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .feed { max-width: 600px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: var(--space-4); }
    .post { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4) var(--space-4) 0; }
    .post-badge { padding: 3px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700; }
    .post-badge.video { background: #FEE2E2; color: #DC2626; }
    .post-badge.article { background: #DBEAFE; color: #2563EB; }
    .post-badge.mcq { background: #DCFCE7; color: #166534; }
    .post-badge.cq { background: #FEF3C7; color: #92400E; }
    .post-badge.sq { background: #E0E7FF; color: #4338CA; }
    .post-meta { font-size: var(--text-xs); color: var(--muted); }
    .post-title { padding: var(--space-3) var(--space-4); font-size: var(--text-lg); font-weight: 700; color: var(--heading); cursor: pointer; }
    .post-title:hover { color: var(--accent); }
    .post-body { padding: 0 var(--space-4) var(--space-4); font-size: var(--text-sm); color: var(--body); line-height: 1.6; }
    .post-body p { margin-bottom: var(--space-2); }
    .post-thumb { width: 100%; height: 200px; object-fit: cover; background: var(--accent-light); }
    .post-video { position: relative; }
    .post-video .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 50px; height: 50px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .post-video .play-btn svg { width: 22px; height: 22px; fill: white; }
    .post-options { display: flex; flex-direction: column; gap: 6px; padding: 0 var(--space-4) var(--space-4); }
    .post-opt { display: block; width: 100%; text-align: left; padding: var(--space-2) var(--space-3); border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; background: var(--bg); transition: all 0.2s; font-family: inherit; font-size: var(--text-sm); }
    .post-opt:hover { border-color: var(--accent); }
    .post-opt.correct { background: #DCFCE7; border-color: #22C55E; color: #166534; font-weight: 600; }
    .post-opt.wrong { background: #FEE2E2; border-color: #DC2626; color: #991B1B; }
    .post-answer { padding: 0 var(--space-4) var(--space-4); display: none; }
    .post-answer.show { display: block; }
    .post-answer textarea { width: 100%; padding: var(--space-2); border: 2px solid var(--border); border-radius: var(--radius-md); font-family: inherit; font-size: var(--text-sm); min-height: 70px; resize: vertical; }
    .post-feedback { margin-top: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); font-size: var(--text-xs); display: none; }
    .post-feedback.correct { background: #DCFCE7; color: #166534; display: block; }
    .post-feedback.wrong { background: #FEE2E2; color: #991B1B; display: block; }
    .post-btn { display: inline-block; padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); font-weight: 600; font-size: var(--text-xs); cursor: pointer; border: none; margin-top: var(--space-2); }
    .post-btn.submit { background: var(--accent); color: var(--primary); }
    body.dark .post { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .post-title { color: var(--dark-heading); }
    body.dark .post-body { color: var(--dark-body); }
    body.dark .post-opt { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="menu.html" class="icon-btn mobile-only"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></a><a href="index.html" class="header-brand">চলো পড়তে বসি</a><nav class="header-nav"><a href="index.html" class="active">হোম</a><a href="articles.html">আর্টিকেল</a><a href="videos.html">ভিডিও</a><a href="exam.html">পরীক্ষা</a><a href="cpb-ai.html">CPB AI</a></nav><a href="search.html" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></a></div></header>
  <main class="main-content">
    <div class="feed" id="feed"><p class="text-muted text-center">লোড হচ্ছে...</p></div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>সেটিংস</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a></nav>
  <footer class="footer">[C] 2026-present. All Rights Reserved. চলো পড়তে বসি</footer>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    function yt(url) { const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/); return m ? 'https://img.youtube.com/vi/'+m[1]+'/mqdefault.jpg' : ''; }
    function clsLabel(c) { return c === '9-10' ? '৯ম-১০ম শ্রেণি' : c + 'ম শ্রেণি'; }
    function typeBadge(type) { const map = { video: 'ভিডিও', article: 'আর্টিকেল', mcq: 'MCQ', cq: 'CQ', sq: 'SQ' }; return map[type] || type?.toUpperCase(); }
    function badgeClass(type) { return 'post-badge ' + (type === 'video' ? 'video' : type === 'article' ? 'article' : type === 'mcq' ? 'mcq' : type === 'cq' ? 'cq' : 'sq'); }

    (async () => {
      const feed = document.getElementById('feed');
      // Fetch all content
      const [videos, articles, questions] = await Promise.all([
        db.collection('videos').orderBy('createdAt','desc').limit(5).get(),
        db.collection('articles').orderBy('createdAt','desc').limit(5).get(),
        db.collection('questions').orderBy('createdAt','desc').limit(10).get()
      ]);

      let posts = [];
      videos.forEach(d => { const data = d.data(); posts.push({ id: d.id, type: 'video', title: data.title, class: data.class, subject: data.subject, url: data.url, createdAt: data.createdAt }); });
      articles.forEach(d => { const data = d.data(); posts.push({ id: d.id, type: 'article', title: data.title, class: data.class, subject: data.subject, content: data.content, image: data.image, createdAt: data.createdAt }); });
      questions.forEach(d => { const data = d.data(); posts.push({ id: d.id, type: data.type, class: data.class, subject: data.subject, question: data.question, options: data.options, answer: data.answer, createdAt: data.createdAt }); });

      posts.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      if (!posts.length) { feed.innerHTML = '<p class="text-muted text-center">কোনো পোস্ট নেই</p>'; return; }

      feed.innerHTML = posts.map((p,i) => {
        const header = `<div class="post-header"><span class="${badgeClass(p.type)}">${typeBadge(p.type)}</span><span class="post-meta">${clsLabel(p.class)}${p.subject ? ' • '+p.subject : ''}</span></div>`;
        let body = '';

        if (p.type === 'video') {
          const thumb = yt(p.url||'');
          body = `<div class="post-title" onclick="window.open('${p.url}','_blank')">${p.title}</div>${thumb ? `<div class="post-video" onclick="window.open('${p.url}','_blank')"><img class="post-thumb" src="${thumb}" alt=""><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div></div>` : ''}`;
        } else if (p.type === 'article') {
          body = `<div class="post-title">${p.title}</div>${p.image ? `<img class="post-thumb" src="${p.image}" alt="">` : ''}<div class="post-body"><p>${(p.content||'').substring(0,200)}...</p></div>`;
        } else if (p.type === 'mcq') {
          const opts = (p.options||'').split(',').filter(o => o.trim());
          body = `<div class="post-title">${p.question}</div><div class="post-options">${opts.map((opt,j) => `<button class="post-opt" id="opt${i}_${j}" onclick="checkMCQ(${i},'${opt.trim().replace(/'/g,"\\'")}','${(p.answer||'').replace(/'/g,"\\'")}')">${opt.trim()}</button>`).join('')}</div>`;
        } else {
          body = `<div class="post-title">${p.question}</div><div class="post-answer show" id="ansArea${i}"><textarea id="ans${i}" placeholder="তোমার উত্তর লিখো..."></textarea><button class="post-btn submit" onclick="checkSQ(${i},'${(p.answer||'').replace(/'/g,"\\'")}')">জমা দাও</button><div class="post-feedback" id="fb${i}"></div></div>`;
        }

        return `<div class="post" id="post${i}">${header}${body}</div>`;
      }).join('');
    })();

    function checkMCQ(i, selected, correct) {
      const post = document.getElementById('post'+i);
      const buttons = post.querySelectorAll('.post-opt');
      buttons.forEach(b => { b.style.pointerEvents = 'none'; if (b.textContent.trim() === correct) b.classList.add('correct'); });
      if (selected !== correct) {
        buttons.forEach(b => { if (b.textContent.trim() === selected) b.classList.add('wrong'); });
      }
      if (selected === correct) {
        post.insertAdjacentHTML('beforeend', '<div class="post-feedback correct" style="display:block;padding:var(--space-3) var(--space-4);">অভিনন্দন! সঠিক উত্তর!</div>');
      } else {
        post.insertAdjacentHTML('beforeend', '<div class="post-feedback wrong" style="display:block;padding:var(--space-3) var(--space-4);">ভুল! সঠিক উত্তর: '+correct+'</div>');
      }
    }

    function checkSQ(i, answer) {
      const userAns = document.getElementById('ans'+i).value.trim();
      const fb = document.getElementById('fb'+i);
      if (userAns.length > 5 && answer && userAns.toLowerCase().includes(answer.toLowerCase().substring(0,10))) {
        fb.className = 'post-feedback correct'; fb.textContent = 'অভিনন্দন! সঠিক উত্তর!';
      } else {
        fb.className = 'post-feedback wrong'; fb.textContent = 'সঠিক উত্তর: ' + answer;
      }
    }
  </script>
</body>
</html>
