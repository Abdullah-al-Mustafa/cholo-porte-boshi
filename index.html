<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fellows</title><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .section { margin-bottom: var(--space-6); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3); }
    .section-title { font-size: clamp(1.1rem,3vw,1.4rem); font-weight: 700; color: var(--heading); }
    .section-link { color: var(--secondary); font-weight: 600; text-decoration: none; font-size: var(--text-sm); }
    .card-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: var(--space-3); }
    @media (min-width: 600px) { .card-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width: 1024px) { .card-grid { grid-template-columns: repeat(4,1fr); } }
    .mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; cursor: pointer; transition: all var(--transition-fast); }
    .mini-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent); transform: translateY(-2px); }
    .mini-card .thumb { height: 120px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; background-color: var(--accent-light); }
    .mini-card .thumb .play-icon { width: 36px; height: 36px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .mini-card .thumb .play-icon svg { width: 16px; height: 16px; fill: white; }
    .mini-card .body { padding: var(--space-3); }
    .mini-card .body h4 { font-size: var(--text-sm); color: var(--heading); margin-bottom: 2px; }
    .mini-card .body .meta { font-size: var(--text-xs); color: var(--muted); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; font-weight: 600; }
    .badge.subject { background: var(--accent-light); color: var(--primary); }
    .badge.class { background: var(--secondary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary); }
    body.dark .mini-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .mini-card .body h4 { color: var(--dark-heading); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="menu.html" class="icon-btn mobile-only"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></a><a href="index.html" class="header-brand">Fellows</a><nav class="header-nav"><a href="index.html" class="active">Home</a><a href="articles.html">Articles</a><a href="videos.html">Videos</a><a href="exam.html">Exams</a><a href="cpb-ai.html">CPB AI</a></nav><a href="search.html" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></a></div></header>
  <main class="main-content">
    <section class="hero"><h1>Fellows</h1><p>Learn Better, Together</p><div class="hero-actions"><a href="cpb-ai.html" class="btn btn-primary btn-lg">CPB AI</a><a href="exam.html" class="btn btn-outline btn-lg" style="border-color:white; color:white; display:inline-flex;align-items:center;gap:8px;"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:white;stroke-width:2;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg> Exams</a></div></section>
    <div class="section"><div class="section-header"><h2 class="section-title">Videos</h2><a href="videos.html" class="section-link">সব Videos</a></div><div class="card-grid" id="homeVideos"><p class="text-muted">Loading......</p></div></div>
    <div class="section"><div class="section-header"><h2 class="section-title">Articles</h2><a href="articles.html" class="section-link">সব Articles</a></div><div class="card-grid" id="homeArticles"><p class="text-muted">Loading......</p></div></div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>Settings</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>Exams</span></a></nav>
  <footer class="footer">© 2026-present. All Rights Reserved. Fellows</footer>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    function yt(url) { const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/); return m ? 'https://img.youtube.com/vi/'+m[1]+'/mqdefault.jpg' : ''; }
    function clsBadge(c) { if (!c || c === 'All' || c === 'all') return '<span class="badge all">For All</span>'; const map = { '6': 'Class 6', '7': 'Class 7', '8': 'Class 8', '9': 'Class 9', '10': 'Class 10', '9-10': 'Class 9-10' }; return `<span class="badge class">For ${map[c] || c}</span>`; }

    (async () => {
      const v = await db.collection('videos').orderBy('createdAt','desc').limit(6).get();
      document.getElementById('homeVideos').innerHTML = v.empty ? '<p class="text-muted">কোনো Videos নেই</p>' : v.docs.map(d => { const t = yt(d.data().url||''); return `<div class="mini-card" onclick="window.open('${d.data().url}','_blank')"><div class="thumb" style="${t?'background-image:url('+t+');':''}">${t?'':'<div class="play-icon"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div>'}</div><div class="body"><h4>${d.data().title}</h4><div class="meta">${clsBadge(d.data().class)} ${d.data().subject||''}</div></div></div>`; }).join('');

      const a = await db.collection('articles').orderBy('createdAt','desc').limit(6).get();
      document.getElementById('homeArticles').innerHTML = a.empty ? '<p class="text-muted">কোনো Articles নেই</p>' : a.docs.map(d => { const img = d.data().image; return `<div class="mini-card" onclick="location.href='article.html?id=${d.id}'"><div class="thumb" style="${img?'background-image:url('+img+');':''}"></div><div class="body"><span class="badge subject">${d.data().subject||'General'}</span><h4>${d.data().title}</h4><div class="meta">${clsBadge(d.data().class)}</div></div></div>`; }).join('');
    })();
  </script>
</body>
</html>
