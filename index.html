  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    async function loadHome() {
      const vSnap = await db.collection('videos').orderBy('createdAt', 'desc').limit(4).get();
      document.getElementById('homeVideos').innerHTML = vSnap.empty ? '<p class="text-muted">কোনো ভিডিও নেই</p>' : vSnap.docs.map(doc => `<div class="card card-clickable" style="min-width:250px;" onclick="window.open('${doc.data().url}','_blank')"><div style="height:120px;background:var(--accent-light);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);"><svg viewBox="0 0 24 24" style="width:36px;height:36px;fill:var(--primary);stroke:none;"><polygon points="6 4 20 12 6 20 6 4"/></svg></div><h4>${doc.data().title}</h4><p class="text-muted">ক্লাস ${doc.data().class}</p></div>`).join('');

      const aSnap = await db.collection('articles').orderBy('createdAt', 'desc').limit(4).get();
      document.getElementById('homeArticles').innerHTML = aSnap.empty ? '<p class="text-muted">কোনো আর্টিকেল নেই</p>' : aSnap.docs.map(doc => `<div class="card card-clickable" style="min-width:280px;"><span style="display:inline-block;padding:2px 10px;background:var(--accent-light);color:var(--primary);border-radius:var(--radius-full);font-size:11px;font-weight:600;margin-bottom:var(--space-2);">${doc.data().subject || ''}</span><h4>${doc.data().title}</h4><p class="text-muted">ক্লাস ${doc.data().class}</p></div>`).join('');
    }
    loadHome();
  </script>
</body>
