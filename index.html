  <style>
    .hero { text-align:center; padding: var(--sp10) var(--sp3) var(--sp8); }
    .hero h1 { font-size: clamp(2rem,6vw,3rem); font-weight:800; color: var(--heading); margin-bottom: var(--sp1); }
    .hero p { color: var(--muted); font-size: clamp(0.9rem,2vw,1.1rem); }
    .topic-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: var(--sp2); max-width: 700px; margin: 0 auto; }
    @media (max-width:400px) { .topic-grid { grid-template-columns: 1fr; } }
    .topic-card { background: var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:var(--sp5) var(--sp3); text-align:center; cursor:pointer; transition:all var(--tr-base); box-shadow:var(--sh-sm); text-decoration:none; color:var(--body); }
    .topic-card:hover { box-shadow:var(--sh-lg); border-color:var(--accent); transform:scale(1.02); }
    .topic-card h3 { font-size:var(--text-lg); font-weight:700; color:var(--heading); margin-bottom:var(--sp1); }
    .topic-card p { font-size:var(--text-xs); color:var(--muted); }
    body.dark .topic-card { background:var(--dark-card); border-color:var(--dark-border); }
    body.dark .topic-card h3 { color:var(--dark-heading); }
  </style>
