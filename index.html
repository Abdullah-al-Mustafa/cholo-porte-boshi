<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PorteBoshi</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0D1B2A"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .section { margin-bottom: var(--sp8); }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp2); }
    .section-title { font-size:clamp(1.1rem,3vw,1.3rem); font-weight:700; color:var(--heading); }
    .section-link { color:var(--primary); font-weight:600; text-decoration:none; font-size:var(--text-sm); }
    .card-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp2); }
    @media (max-width:768px) { .card-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:400px) { .card-grid { grid-template-columns:1fr; } }
    .mini-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; cursor:pointer; transition:all var(--tr-base); box-shadow:var(--sh-sm); text-decoration:none; color:var(--body); }
    .mini-card:hover { box-shadow:var(--sh-lg); border-color:var(--accent); transform:scale(1.02); }
    .mini-card .thumb { height:130px; background-size:cover; background-position:center; background-color:var(--secondary); }
    .mini-card .body { padding:var(--sp3); }
    .mini-card .body h4 { font-size:var(--text-sm); font-weight:600; color:var(--heading); margin-bottom:4px; }
    .mini-card .body .meta { font-size:var(--text-xs); color:var(--muted); }
    .badge { display:inline-block; padding:2px 8px; border-radius:var(--r-full); font-size:10px; font-weight:600; }
    .badge.subject { background:var(--secondary); color:var(--primary); }
    .badge.class { background:var(--primary); color:white; }
    .badge.all { background:var(--accent); color:var(--primary-dark); }
    body.dark .mini-card { background:var(--dark-card); border-color:var(--dark-border); }
    body.dark .mini-card .body h4 { color:var(--dark-heading); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="settings.html" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a><a href="index.html" class="header-brand">PorteBoshi</a><a href="search.html" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></a></div></header>
  <main class="main-content">
    <section class="hero"><h1>PorteBoshi</h1><p>A Bangladesh Curriculum-Based Learning Platform</p></section>

    <!-- Videos Section -->
    <div class="section"><div class="section-header"><h2 class="section-title">Videos</h2><a href="videos.html" class="section-link">All Videos →</a></div><div class="card-grid" id="homeVideos"><p class="text-muted">Loading...</p></div></div>

    <!-- Stories Section -->
    <div class="section"><div class="section-header"><h2 class="section-title">Stories</h2><a href="stories.html" class="section-link">All Stories →</a></div><div class="card-grid" id="homeStories"><p class="text-muted">Loading...</p></div></div>

    <!-- Paragraphs Section -->
    <div class="section"><div class="section-header"><h2 class="section-title">Paragraphs</h2><a href="paragraphs.html" class="section-link">All Paragraphs →</a></div><div class="card-grid" id="homeParagraphs"><p class="text-muted">Loading...</p></div></div>

    <!-- Dialogues Section -->
    <div class="section"><div class="section-header"><h2 class="section-title">Dialogues</h2><a href="dialogues.html" class="section-link">All Dialogues →</a></div><div class="card-grid" id="homeDialogues"><p class="text-muted">Loading...</p></div></div>

    <!-- Essays Section -->
    <div class="section"><div class="section-header"><h2 class="section-title">Essays</h2><a href="essays.html" class="section-link">All Essays →</a></div><div class="card-grid" id="homeEssays"><p class="text-muted">Loading...</p></div></div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>Exam</span></a>
    <a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">AI</span><span>AI</span></a>
    <a href="extra.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Extra</span></a>
  </nav>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();

    function clsBadge(c) {
      if (!c || c === 'All' || c === 'all') return '<span class="badge all">For All</span>';
      const map = {'6':'Class 6','7':'Class 7','8':'Class 8','9-10':'Class 9-10'};
      return `<span class="badge class">For ${map[c]||c}</span>`;
    }

    function getThumb(url) {
      if (!url) return '';
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return m ? 'https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg' : '';
    }

    async function loadSection(collection, elementId, type) {
      const el = document.getElementById(elementId);
      const s = await db.collection(collection).orderBy('createdAt','desc').limit(4).get();
      if (s.empty) { el.innerHTML = '<p class="text-muted">No items yet</p>'; return; }
      el.innerHTML = s.docs.map(d => {
        const data = d.data();
        if (type === 'video') {
          const t = getThumb(data.url||'');
          return `<div class="mini-card" onclick="window.open('${data.url}','_blank')"><div class="thumb" style="${t?'background-image:url('+t+');':'background-color:#0A1F12;'}"></div><div class="body"><h4>${data.title}</h4><div class="meta">${clsBadge(data.class)} ${data.subject||''}</div></div></div>`;
        }
        const img = data.image;
        const pageUrl = type + '-read.html?id=' + d.id;
        return `<div class="mini-card" onclick="location.href='${pageUrl}'"><div class="thumb" style="${img?'background-image:url('+img+');':'background:var(--secondary);'}"></div><div class="body"><span class="badge subject">${data.subject||''}</span><h4>${data.title}</h4><div class="meta">${clsBadge(data.class)}</div></div></div>`;
      }).join('');
    }

    // Load all sections
    loadSection('videos', 'homeVideos', 'video');
    loadSection('stories', 'homeStories', 'story');
    loadSection('paragraphs', 'homeParagraphs', 'paragraph');
    loadSection('dialogues', 'homeDialogues', 'dialogue');
    loadSection('essays', 'homeEssays', 'essay');
  </script>
</body>
</html>
