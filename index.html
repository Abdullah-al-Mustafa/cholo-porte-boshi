<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .section { margin-bottom: var(--sp6); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp2); }
    .section-title { font-size: clamp(1.1rem,3vw,1.3rem); font-weight: 700; color: var(--heading); }
    .section-link { color: var(--primary); font-weight: 600; text-decoration: none; font-size: var(--text-sm); }
    .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp2); }
    @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 400px) { .card-grid { grid-template-columns: 1fr; } }
    .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; cursor: pointer; transition: all var(--tr-base); box-shadow: var(--sh-sm); }
    .video-card:hover { box-shadow: var(--sh-lg); border-color: var(--secondary-hover); transform: scale(1.02); }
    .video-card .thumb { height: 160px; background-size: cover; background-position: center; background-color: #0A1F12; position: relative; }
    .video-card .thumb .v-label { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.75); color: white; font-size: 9px; padding: 4px 10px; border-radius: var(--r-full); z-index: 1; font-weight: 600; letter-spacing: 0.5px; }
    .video-card .body { padding: var(--sp3); }
    .video-card .body h4 { font-size: var(--text-sm); font-weight: 600; color: var(--heading); margin-bottom: 6px; line-height: 1.4; }
    .video-card .body .meta { font-size: var(--text-xs); color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .badge.subject { background: var(--secondary); color: var(--primary); }
    .badge.class { background: var(--primary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary-dark); }

    /* Tools Popup */
    .tools-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .tools-overlay.show { display: flex; }
    .tools-sheet { background: var(--surface); border-radius: var(--r-lg) var(--r-lg) 0 0; padding: var(--sp5) var(--sp3) var(--sp6); width: 100%; max-width: 400px; animation: slideUp 0.25s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .tools-sheet h3 { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--sp3); color: var(--heading); text-align: center; }
    .tools-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp1); }
    .tool-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: var(--sp2); border-radius: var(--r-md); cursor: pointer; transition: background var(--tr-fast); text-decoration: none; color: var(--body); }
    .tool-item:hover { background: var(--secondary); }
    .tool-icon { width: 48px; height: 48px; border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; }
    .tool-icon svg { width: 24px; height: 24px; stroke: var(--primary); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tool-label { font-size: 11px; font-weight: 600; color: var(--heading); text-align: center; }

    body.dark .video-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .video-card .body h4 { color: var(--dark-heading); }
    body.dark .tools-sheet { background: var(--dark-surface); }
    body.dark .tool-icon svg { stroke: var(--accent); }
    body.dark .tool-label { color: var(--dark-heading); }
  </style>
</head>
