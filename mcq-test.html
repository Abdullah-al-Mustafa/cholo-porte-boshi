<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MCQ Exams - চলো পড়তে বসি</title><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .test-page { max-width: 700px; margin: 0 auto; width: 100%; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { background: var(--surface); border-radius: var(--radius-xl); padding: var(--space-6); max-width: 400px; width: 90%; }
    .modal-box h3 { margin-bottom: var(--space-4); }
    .class-option { display: block; width: 100%; padding: var(--space-3); margin-bottom: var(--space-2); border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; text-align: center; font-size: var(--text-base); background: var(--surface); }
    .class-option:hover { background: var(--accent-light); border-color: var(--accent); }
    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-4); }
    .q-meta { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-3); }
    .q-badge { padding: 2px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; }
    .q-badge.type { background: var(--accent); color: var(--primary); }
    .q-badge.class { background: var(--accent-light); color: var(--primary); }
    .q-badge.subject { background: var(--secondary); color: white; }
    .question-card h3 { color: var(--heading); margin-bottom: var(--space-4); }
    .option { display: block; padding: var(--space-3) var(--space-4); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: var(--space-2); cursor: pointer; transition: all 0.2s; }
    .option:hover { border-color: var(--accent); background: var(--accent-light); }
    .option.correct { background: #DCFCE7; border-color: #22C55E; color: #166534; font-weight: 600; }
    .option.wrong { background: #FEE2E2; border-color: #DC2626; color: #991B1B; }
    .btn-row { display: flex; gap: var(--space-3); margin-top: var(--space-4); }
    body.dark .question-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .option { border-color: var(--dark-border); }
    body.dark .modal-box { background: var(--dark-surface); }
    body.dark .class-option { background: var(--dark-surface); border-color: var(--dark-border); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="exam.html" class="icon-btn"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a><span style="color:rgba(255,255,255,0.85);">MCQ Exams</span><span style="width:40px;"></span></div></header>
  <main class="main-content"><div class="test-page" id="testArea"><p class="text-center text-muted">Select class to start......</p></div></main>
  <div class="modal show" id="classModal"><div class="modal-box"><h3>Select Class</h3><button class="class-option" onclick="startTest('6')">৬ষ্ঠ Class</button><button class="class-option" onclick="startTest('7')">৭ম Class</button><button class="class-option" onclick="startTest('8')">৮ম Class</button><button class="class-option" onclick="startTest('9-10')">৯ম-১০ম Class</button></div></div>
  <footer class="footer">[C] 2026-present. All Rights Reserved. চলো পড়তে বসি</footer>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore(); let questions = [], current = 0, score = 0;
    async function startTest(cls) { document.getElementById('classModal').classList.remove('show'); const s = await db.collection('questions').where('type','==','mcq').where('class','==',cls).limit(10).get(); if (s.empty) { document.getElementById('testArea').innerHTML = '<p class="text-center text-muted">এই ক্লাসের কোনো MCQ Question নেই</p>'; return; } questions = s.docs.map(d => ({ id: d.id, ...d.data() })); questions = questions.sort(() => Math.random() - 0.5); current = 0; score = 0; renderQuestion(); }
    function clsLabel(c) { return c === '9-10' ? '৯ম-১০ম Class' : c + 'ম Class'; }
    function renderQuestion() { if (current >= questions.length) return showResult(); const q = questions[current]; const opts = (q.options || '').split(',').filter(o => o.trim()); document.getElementById('testArea').innerHTML = `<div class="question-card"><div class="q-meta"><span class="q-badge type">MCQ</span><span class="q-badge class">${clsLabel(q.class)}</span>${q.subject?`<span class="q-badge subject">${q.subject}</span>`:''}</div><p style="color:var(--muted);font-size:var(--text-xs);margin-bottom:var(--space-2);">Question ${current+1}/${questions.length}</p><h3>${q.question}</h3>${opts.map((opt,i) => `<div class="option" onclick="selectAnswer(${i},'${q.answer?.trim()}',this)">${opt.trim()}</div>`).join('')}<div class="btn-row"><button class="btn btn-outline" id="nextBtn" style="display:none;" onclick="nextQuestion()">Next</button></div></div>`; }
    function selectAnswer(index, correct, el) { document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none'); const opts = (questions[current].options || '').split(','); if (opts[index]?.trim() === correct) { el.classList.add('correct'); score++; } else { el.classList.add('wrong'); document.querySelectorAll('.option').forEach(o => { if (o.textContent.trim() === correct) o.classList.add('correct'); }); } document.getElementById('nextBtn').style.display = 'inline-flex'; }
    function nextQuestion() { current++; renderQuestion(); }
    function showResult() { document.getElementById('testArea').innerHTML = `<div class="question-card" style="text-align:center;"><h2>${score}/${questions.length}</h2><p style="color:var(--muted);">Your Score</p><button class="btn btn-primary" onclick="location.reload()" style="margin-top:var(--space-4);">Try Again</button></div>`; }
  </script>
</body>
</html>
