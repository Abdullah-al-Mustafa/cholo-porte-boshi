<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Model Test - পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .page { max-width:720px; margin:0 auto; width:100%; }
    .page h2 { font-size:var(--text-3xl); font-weight:800; color:var(--heading); text-align:center; margin-bottom:8px; }
    .page .subtitle { text-align:center; color:var(--muted); font-size:var(--text-sm); margin-bottom:var(--sp6); }
    /* Tabs */
    .tabs { display:flex; gap:var(--sp1); margin-bottom:var(--sp6); background:var(--bg); border-radius:var(--r-full); padding:4px; border:1px solid var(--border); }
    .tab-btn { flex:1; padding:12px 20px; border-radius:var(--r-full); border:none; background:transparent; color:var(--body); font-weight:600; font-size:var(--text-sm); cursor:pointer; transition:all var(--tr-fast); font-family:var(--font); white-space:nowrap; }
    .tab-btn.active { background:var(--primary-green); color:white; box-shadow:var(--sh-sm); }
    /* Test Cards */
    .test-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:var(--sp3); }
    .test-card {
      background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
      padding:36px 24px 32px; text-align:center; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow:0 6px 12px -4px rgba(0,0,0,0.06);
      display:flex; flex-direction:column; align-items:center; gap:16px;
      text-decoration:none; color:var(--body);
    }
    .test-card:hover {
      transform:translateY(-10px); box-shadow:0 25px 30px -10px rgba(21,128,61,0.18);
      border-color:var(--primary-green);
    }
    .test-icon { width:76px; height:76px; border-radius:22px; display:flex; align-items:center; justify-content:center; }
    .test-icon svg { width:38px; height:38px; stroke:var(--primary-green); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .test-card h3 { font-size:1.2rem; font-weight:700; color:var(--heading); }
    .test-info { font-size:0.9rem; color:var(--muted); line-height:1.5; }
    .btn-start { margin-top:auto; padding:12px 28px; border-radius:var(--r-full); background:var(--primary-green); color:white; font-weight:600; font-size:0.95rem; border:none; cursor:pointer; transition:all var(--tr-fast); text-decoration:none; display:inline-block; }
    .btn-start:hover { background:var(--dark-green); transform:scale(1.05); }
    /* Full Model Test placeholder */
    .placeholder-card { background:var(--surface); border:1.5px dashed var(--border); border-radius:24px; padding:var(--sp10) var(--sp4); text-align:center; }
    .placeholder-card p { color:var(--muted); font-size:1rem; }
    body.dark .test-card { background:var(--dark-card); border-color:var(--dark-border); }
    body.dark .test-card h3 { color:var(--dark-heading); }
    body.dark .tabs { background:var(--dark-surface); border-color:var(--dark-border); }
    body.dark .tab-btn { color:var(--dark-body); }
    body.dark .tab-btn.active { background:var(--primary-green); color:white; }
    body.dark .placeholder-card { background:var(--dark-card); border-color:var(--dark-border); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="icon-btn" aria-label="Back"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a><span style="color:white;font-weight:700;font-size:1.2rem;margin:0 auto;" data-t="modelTest">Model Test</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="page">
      <h2 data-t="modelTest">Model Test</h2>
      <p class="subtitle">পরীক্ষা দিয়ে নিজেকে যাচাই করো</p>
      
      <!-- Tabs -->
      <div class="tabs" id="testTabs">
        <button class="tab-btn active" onclick="switchTab('single')" data-t="singleTest">Single Test</button>
        <button class="tab-btn" onclick="switchTab('full')" data-t="fullModelTest">Full Model Test</button>
      </div>

      <!-- Single Test Cards -->
      <div id="singleTests" class="test-grid">
        <a href="mcq-test.html" class="test-card">
          <div class="test-icon" style="background:#DCFCE7;"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg></div>
          <h3 data-t="mcqTest">MCQ Test</h3>
          <div class="test-info">২৫টি বহুনির্বাচনি প্রশ্ন<br>সময়: ৩০ মিনিট</div>
          <span class="btn-start" data-t="startTest">Start Test</span>
        </a>
        <a href="cq-test.html" class="test-card">
          <div class="test-icon" style="background:#DBEAFE;"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <h3 data-t="cqTest">CQ Test</h3>
          <div class="test-info">৫টি সৃজনশীল প্রশ্ন<br>সময়: ৪৫ মিনিট</div>
          <span class="btn-start" data-t="startTest">Start Test</span>
        </a>
        <a href="sq-test.html" class="test-card">
          <div class="test-icon" style="background:#FEF3C7;"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
          <h3 data-t="sqTest">SQ Test</h3>
          <div class="test-info">১০টি সংক্ষিপ্ত প্রশ্ন<br>সময়: ২০ মিনিট</div>
          <span class="btn-start" data-t="startTest">Start Test</span>
        </a>
      </div>

      <!-- Full Model Test Placeholder -->
      <div id="fullTests" style="display:none;">
        <div class="placeholder-card">
          <p>🔜 পূর্ণাঙ্গ মডেল টেস্ট শীঘ্রই আসছে</p>
        </div>
      </div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span data-t="home">হোম</span></a>
    <a href="model-test.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span data-t="exam">পরীক্ষা</span></a>
    <a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">AI</span><span data-t="ai">এআই</span></a>
    <a href="tools.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span data-t="tools">টুলস</span></a>
  </nav>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('singleTests').style.display = tab === 'single' ? 'grid' : 'none';
      document.getElementById('fullTests').style.display = tab === 'full' ? 'block' : 'none';
    }
  </script>
</body>
</html>
