<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - পড়তে বসি</title>
  <link rel="manifest" href="admin-manifest.json">
  <meta name="theme-color" content="#0D1B2A">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui, sans-serif; background:#F8FAFC; min-height:100vh; }
    
    /* Login Page */
    #loginPage {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #F8FAFC;
    }
    .login-box {
      background: white; padding: 40px; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
    }
    .login-box h2 { margin-bottom: 24px; color: #0F172A; text-align: center; }
    .login-box input {
      width: 100%; padding: 12px 16px; margin-bottom: 16px;
      border: 2px solid #E2E8F0; border-radius: 8px; font-size: 1rem;
    }
    .login-box button {
      width: 100%; padding: 12px; background: #15803D; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .login-box .error { color: #DC2626; margin-top: 12px; display: none; }
    
    /* Dashboard */
    #dashboardPage { display: none; }
    .header {
      background: #15803D; color: white; padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header h1 { font-size: 1.25rem; }
    .header button {
      background: rgba(255,255,255,0.2); color: white; border: none;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    
    .container { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab {
      padding: 8px 16px; background: white; border: 1px solid #E2E8F0;
      border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 0.9rem;
    }
    .tab.active { background: #15803D; color: white; border-color: #15803D; }
    
    /* Form */
    .form-card {
      background: white; border-radius: 12px; padding: 24px;
      border: 1px solid #E2E8F0; margin-bottom: 24px;
    }
    .form-card h3 { margin-bottom: 16px; color: #0F172A; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #E2E8F0;
      border-radius: 8px; font-size: 0.95rem; font-family: inherit;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .btn-submit {
      padding: 10px 20px; background: #15803D; color: white;
      border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem;
    }
    
    /* Grid List */
    .list-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .list-card {
      background: white; border: 1px solid #E2E8F0; border-radius: 10px;
      padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .list-card h4 { font-size: 0.95rem; margin-bottom: 4px; }
    .list-card p { font-size: 0.8rem; color: #64748B; margin-bottom: 8px; }
    .list-card button {
      padding: 4px 12px; border: 1px solid #FECACA; background: #FEE2E2;
      color: #DC2626; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <!-- Login Page -->
  <div id="loginPage">
    <div class="login-box">
      <h2>Admin Login</h2>
      <input type="email" id="loginEmail" placeholder="Email address">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="handleLogin()">Sign In</button>
      <p class="error" id="loginError">Login failed. Check credentials.</p>
    </div>
  </div>

  <!-- Dashboard Page -->
  <div id="dashboardPage">
    <div class="header">
      <h1>Admin Panel</h1>
      <button onclick="handleLogout()">Logout</button>
    </div>
    <div class="container">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('videos')">Videos</button>
        <button class="tab" onclick="switchTab('writings')">Writings</button>
        <button class="tab" onclick="switchTab('questions')">Questions</button>
      </div>

      <!-- Videos -->
      <div id="tab-videos">
        <div class="form-card">
          <h3>Add Video</h3>
          <div class="form-group"><label>Title</label><input type="text" id="vTitle"></div>
          <div class="form-group"><label>Class</label><select id="vClass"><option value="All">All</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9-10">9-10</option></select></div>
          <div class="form-group"><label>Subject</label><input type="text" id="vSubject"></div>
          <div class="form-group"><label>Chapter</label><input type="text" id="vChapter"></div>
          <div class="form-group"><label>Video URL</label><input type="text" id="vUrl"></div>
          <button class="btn-submit" onclick="addVideo()">Add Video</button>
        </div>
        <div class="list-grid" id="videosList"></div>
      </div>

      <!-- Writings -->
      <div id="tab-writings" style="display:none;">
        <div class="form-card">
          <h3>Add Writing</h3>
          <div class="form-group"><label>Category</label><select id="wCategory"><option value="paragraph">Paragraph</option><option value="essay">Essay</option><option value="letter">Letter</option></select></div>
          <div class="form-group"><label>Title</label><input type="text" id="wTitle"></div>
          <div class="form-group"><label>Class</label><select id="wClass"><option value="All">All</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9-10">9-10</option></select></div>
          <div class="form-group"><label>Subject</label><input type="text" id="wSubject"></div>
          <div class="form-group"><label>Content</label><textarea id="wContent"></textarea></div>
          <button class="btn-submit" onclick="addWriting()">Add Writing</button>
        </div>
        <div class="list-grid" id="writingsList"></div>
      </div>

      <!-- Questions -->
      <div id="tab-questions" style="display:none;">
        <div class="form-card">
          <h3>Add MCQ</h3>
          <div class="form-group"><label>Class</label><select id="qClass"><option value="All">All</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9-10">9-10</option></select></div>
          <div class="form-group"><label>Subject</label><input type="text" id="qSubject"></div>
          <div class="form-group"><label>Chapter</label><input type="text" id="qChapter"></div>
          <div class="form-group"><label>Question</label><textarea id="qQuestion"></textarea></div>
          <div class="form-group"><label>Option 1</label><input type="text" id="qOpt1"></div>
          <div class="form-group"><label>Option 2</label><input type="text" id="qOpt2"></div>
          <div class="form-group"><label>Option 3</label><input type="text" id="qOpt3"></div>
          <div class="form-group"><label>Option 4</label><input type="text" id="qOpt4"></div>
          <div class="form-group"><label>Correct Answer Number (1-4)</label><input type="number" id="qCorrect" min="1" max="4"></div>
          <button class="btn-submit" onclick="addQuestion()">Add Question</button>
        </div>
        <div class="list-grid" id="questionsList"></div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // Initialize Firebase
    const db = firebase.firestore();
    
    // Auth state listener
    auth.onAuthStateChanged(function(user) {
      if (user) {
        // Logged in
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboardPage').style.display = 'block';
        loadAllData();
      } else {
        // Logged out
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('dashboardPage').style.display = 'none';
      }
    });

    function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      auth.signInWithEmailAndPassword(email, password)
        .then(function() {
          console.log('Login successful');
        })
        .catch(function(error) {
          console.error('Login error:', error);
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('loginError').textContent = error.message;
        });
    }

    function handleLogout() {
      auth.signOut();
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('[id^="tab-"]').forEach(d => d.style.display = 'none');
      document.getElementById('tab-' + tab).style.display = 'block';
    }

    // Add Video
    async function addVideo() {
      const title = document.getElementById('vTitle').value.trim();
      if (!title) return alert('Title required');
      await db.collection('videos').add({
        title: title,
        class: document.getElementById('vClass').value,
        subject: document.getElementById('vSubject').value,
        chapter: document.getElementById('vChapter').value,
        url: document.getElementById('vUrl').value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('Video added!');
      document.getElementById('vTitle').value = '';
      document.getElementById('vSubject').value = '';
      document.getElementById('vChapter').value = '';
      document.getElementById('vUrl').value = '';
      loadVideos();
    }

    async function loadVideos() {
      const s = await db.collection('videos').orderBy('createdAt','desc').get();
      const container = document.getElementById('videosList');
      container.innerHTML = s.docs.map(d => `
        <div class="list-card">
          <h4>${d.data().title}</h4>
          <p>Class ${d.data().class} • ${d.data().subject || ''}</p>
          <button onclick="deleteItem('videos','${d.id}')">Delete</button>
        </div>
      `).join('') || '<p>No videos</p>';
    }

    // Add Writing
    async function addWriting() {
      const title = document.getElementById('wTitle').value.trim();
      if (!title) return alert('Title required');
      await db.collection('writings').add({
        category: document.getElementById('wCategory').value,
        title: title,
        class: document.getElementById('wClass').value,
        subject: document.getElementById('wSubject').value,
        content: document.getElementById('wContent').value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('Writing added!');
      document.getElementById('wTitle').value = '';
      document.getElementById('wContent').value = '';
      loadWritings();
    }

    async function loadWritings() {
      const s = await db.collection('writings').orderBy('createdAt','desc').get();
      const container = document.getElementById('writingsList');
      container.innerHTML = s.docs.map(d => `
        <div class="list-card">
          <h4>${d.data().title}</h4>
          <p>${d.data().category} • Class ${d.data().class}</p>
          <button onclick="deleteItem('writings','${d.id}')">Delete</button>
        </div>
      `).join('') || '<p>No writings</p>';
    }

    // Add Question
    async function addQuestion() {
      const q = document.getElementById('qQuestion').value.trim();
      if (!q) return alert('Question required');
      const correct = parseInt(document.getElementById('qCorrect').value);
      if (!correct || correct < 1 || correct > 4) return alert('Correct answer number required');
      const opts = [
        document.getElementById('qOpt1').value,
        document.getElementById('qOpt2').value,
        document.getElementById('qOpt3').value,
        document.getElementById('qOpt4').value
      ];
      await db.collection('questions').add({
        type: 'mcq',
        class: document.getElementById('qClass').value,
        subject: document.getElementById('qSubject').value,
        chapter: document.getElementById('qChapter').value,
        question: q,
        options: opts.join(','),
        answer: opts[correct-1],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('Question added!');
      document.getElementById('qQuestion').value = '';
      loadQuestions();
    }

    async function loadQuestions() {
      const s = await db.collection('questions').orderBy('createdAt','desc').limit(20).get();
      const container = document.getElementById('questionsList');
      container.innerHTML = s.docs.map(d => `
        <div class="list-card">
          <h4>${(d.data().question || '').substring(0,60)}...</h4>
          <p>${d.data().type} • Class ${d.data().class} • ${d.data().subject}</p>
          <button onclick="deleteItem('questions','${d.id}')">Delete</button>
        </div>
      `).join('') || '<p>No questions</p>';
    }

    async function deleteItem(collection, id) {
      if (confirm('Delete this item?')) {
        await db.collection(collection).doc(id).delete();
        loadAllData();
      }
    }

    function loadAllData() {
      loadVideos();
      loadWritings();
      loadQuestions();
    }
  </script>
</body>
</html>
