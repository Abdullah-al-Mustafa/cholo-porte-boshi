<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ডেইলি কুইজ - চলো পড়তে বসি</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D1B2A">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .quiz-page { max-width: 700px; margin: 0 auto; width: 100%; }
    .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-4); }
    .quiz-card h3 { color: var(--heading); margin-bottom: var(--space-4); font-size: var(--text-lg); }
    .option { display: block; padding: var(--space-3) var(--space-4); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: var(--space-2); cursor: pointer; transition: all var(--transition-fast); }
    .option:hover { border-color: var(--accent); background: var(--accent-light); }
    .option.selected { background: var(--accent); color: var(--primary); border-color: var(--accent); font-weight: 600; }
    .option.correct { background: #DCFCE7; border-color: #22C55E; color: #166534; }
    .option.wrong { background: #FEE2E2; border-color: #DC2626; color: #991B1B; }
    .score-card { text-align: center; padding: var(--space-8); background: var(--accent-light); border-radius: var(--radius-xl); margin-top: var(--space-6); }
    .score-card h2 { color: var(--primary); font-size: var(--text-3xl); }
    body.dark .quiz-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .quiz-card h3 { color: var(--dark-heading); }
    body.dark .option { border-color: var(--dark-border); }
    body.dark .option.correct { background: rgba(34,197,94,0.2); }
    body.dark .option.wrong { background: rgba(220,38,38,0.2); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="exam.html" class="icon-btn"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
      <span style="color:rgba(255,255,255,0.85);">ডেইলি কুইজ</span>
      <span style="width:40px;"></span>
    </div>
  </header>

  <main class="main-content">
    <div class="quiz-page" id="quizContainer">
      <p class="text-muted text-center">লোড হচ্ছে...</p>
    </div>
  </main>

  <footer class="footer">[C] 2026-present. All Rights Reserved. চলো পড়তে বসি</footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    let questions = [], current = 0, score = 0;

    async function loadQuiz() {
      const snapshot = await db.collection('questions').where('type', '==', 'mcq').limit(5).get();
      if (snapshot.empty) {
        document.getElementById('quizContainer').innerHTML = '<p class="text-muted text-center">কোনো প্রশ্ন নেই</p>';
        return;
      }
      questions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      questions = questions.sort(() => Math.random() - 0.5);
      renderQuestion();
    }

    function renderQuestion() {
      if (current >= questions.length) return showScore();
      const q = questions[current];
      const opts = (q.options || '').split(',').filter(o => o.trim());
      document.getElementById('quizContainer').innerHTML = `
        <div class="quiz-card">
          <p style="color:var(--muted);font-size:var(--text-xs);margin-bottom:var(--space-2);">প্রশ্ন ${current + 1}/${questions.length}</p>
          <h3>${q.question}</h3>
          ${opts.map((opt, i) => `<div class="option" onclick="selectAnswer(${i}, '${q.answer?.trim()}', this)">${opt.trim()}</div>`).join('')}
        </div>
      `;
    }

    function selectAnswer(index, correct, el) {
      document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
      const opts = (questions[current].options || '').split(',');
      if (opts[index]?.trim() === correct) {
        el.classList.add('correct');
        score++;
      } else {
        el.classList.add('wrong');
        document.querySelectorAll('.option').forEach(o => {
          if (o.textContent.trim() === correct) o.classList.add('correct');
        });
      }
      current++;
      setTimeout(renderQuestion, 1000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = `
        <div class="score-card">
          <h2>${score}/${questions.length}</h2>
          <p style="color:var(--muted);">তোমার স্কোর</p>
          <button class="btn btn-primary" onclick="location.reload()" style="margin-top:var(--space-4);">আবার চেষ্টা করো</button>
        </div>
      `;
    }

    loadQuiz();
  </script>
</body>
</html>
