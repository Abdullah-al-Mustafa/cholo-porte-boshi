<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>CPB AI</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0D1B2A"><link rel="icon" type="image/svg+xml" href="cpb-ai-icon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    html, body { width: 100%; max-width: 100vw; overflow-x: hidden; position: relative; }
    .ai-workspace { display: flex; flex-direction: column; height: calc(100vh - var(--header-height) - var(--bottom-nav-height)); width: 100%; max-width: 100vw; overflow: hidden; margin: 0 auto; }
    @media (min-width: 768px) { .ai-workspace { max-width: 800px; } }
    .ai-conversation { flex: 1; overflow-y: auto; overflow-x: hidden; padding: var(--space-4); width: 100%; max-width: 100%; display: flex; flex-direction: column; gap: var(--space-5); }
    .ai-empty-state { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
    .ai-empty-text { font-size: clamp(1.25rem, 4vw, 2rem); font-weight: 700; color: var(--muted); text-align: center; }
    .ai-message-block { width: 100%; max-width: 100%; overflow-wrap: break-word; word-break: break-word; }
    .ai-message-block.user { display: flex; justify-content: flex-end; }
    .ai-message-content { padding: var(--space-4); border-radius: var(--radius-lg); line-height: 1.7; font-size: clamp(0.875rem, 2vw, 1rem); max-width: 100%; overflow-wrap: break-word; }
    .ai-message-block.user .ai-message-content { background: var(--secondary); color: var(--body); max-width: 85%; border-bottom-right-radius: var(--radius-sm); }
    .ai-message-block.bot .ai-message-content { background: var(--surface); border: 1px solid var(--border); color: var(--body); max-width: 100%; border-bottom-left-radius: var(--radius-sm); width: 100%; box-sizing: border-box; }
    .ai-input-section { padding: var(--space-3); background: var(--surface); border-top: 1px solid var(--border); width: 100%; max-width: 100%; box-sizing: border-box; flex-shrink: 0; }
    .ai-input-container { display: flex; align-items: center; gap: var(--space-2); width: 100%; max-width: 100%; }
    .ai-input-wrapper { flex: 1; display: flex; align-items: center; background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-2xl); padding: var(--space-1) var(--space-4); min-width: 0; }
    .ai-input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(21,128,61,0.08); }
    .ai-input-wrapper input { flex: 1; border: none; outline: none; background: transparent; font-size: clamp(0.875rem, 2vw, 1rem); font-family: var(--font-family); padding: var(--space-3) 0; color: var(--body); min-width: 0; }
    .ai-send-btn { width: 44px; height: 44px; min-width: 44px; border-radius: var(--radius-md); border: none; background: var(--accent); color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .ai-send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .ai-send-btn svg { width: 20px; height: 20px; stroke: var(--primary); stroke-width: 2; fill: none; }
    .ai-disclaimer { text-align: center; padding: var(--space-2) 0 0; font-size: clamp(0.65rem, 1.5vw, 0.75rem); color: var(--muted); }
    body.dark .ai-message-block.user .ai-message-content { background: rgba(212,175,55,0.12); }
    body.dark .ai-message-block.bot .ai-message-content { background: var(--dark-surface); border-color: var(--dark-border); }
    body.dark .ai-input-section { background: var(--dark-surface); border-color: var(--dark-border); }
    body.dark .ai-input-wrapper { background: var(--dark-bg); border-color: var(--dark-border); }
    body.dark .ai-input-wrapper input { color: var(--dark-body); }
  </style>
</head>
<body>
