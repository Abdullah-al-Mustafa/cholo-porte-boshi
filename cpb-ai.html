<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tutor AI - পড়তে বসি</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#15803D">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { width:100%; max-width:100vw; overflow-x:hidden; }
    body { 
      margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column;
      background:#F8FAFC; font-family: var(--font);
      padding-bottom: var(--nav-h); /* space for bottom nav */
    }
    .ai-header {
      background: linear-gradient(135deg, #15803D, #166534);
      color: white; padding: 20px 24px; text-align: center;
      flex-shrink: 0;
    }
    .ai-header h1 { font-size: 1.9rem; margin: 0; font-weight: 700; }
    .ai-header p { opacity: 0.9; margin-top: 4px; }

    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px 20px;
    }
    .welcome {
      text-align: center; margin: 30px 0 40px;
    }
    .teacher-icon {
      width: 90px; height: 90px; margin: 0 auto 16px;
      background: rgba(21,128,61,0.08); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .teacher-icon svg {
      width: 52px; height: 52px; stroke: #15803D; fill: none;
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
    }
    .welcome h2 { font-size: 1.5rem; color: #0F172A; margin-bottom: 6px; }
    .welcome p { color: #334155; font-size: 1rem; }

    .prompt-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px; margin-top: 10px;
    }
    .prompt {
      background: white; border: 1.5px solid #E2E8F0; border-radius: 20px;
      padding: 18px 14px; text-align: center; cursor: pointer;
      transition: all 0.25s; font-size: 0.95rem; color: #334155;
    }
    .prompt:hover {
      border-color: #15803D; transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(21,128,61,0.12);
    }

    .input-area {
      padding: 16px 20px; background: white; border-top: 1px solid #E2E8F0;
      flex-shrink: 0;
    }
    .input-box { display: flex; gap: 12px; align-items: center; }
    .input-box input {
      flex: 1; padding: 16px 22px; border: 2px solid #E2E8F0;
      border-radius: 999px; font-size: 1.05rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .input-box input:focus { border-color: #15803D; }
    .input-box button {
      background: #15803D; color: white; border: none; width: 56px; height: 56px;
      border-radius: 50%; font-size: 1.6rem; display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: background 0.2s;
      flex-shrink: 0;
    }
    .input-box button:hover { background: #166534; }

    /* Dark mode support */
    body.dark { background: var(--dark-bg); }
    body.dark .ai-header { background: linear-gradient(135deg, #062415, #052012); }
    body.dark .chat-area { background: var(--dark-bg); }
    body.dark .welcome h2 { color: var(--dark-heading); }
    body.dark .welcome p { color: var(--dark-body); }
    body.dark .prompt { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
    body.dark .prompt:hover { border-color: var(--accent); }
    body.dark .input-area { background: var(--dark-surface); border-color: var(--dark-border); }
    body.dark .input-box input { background: var(--dark-bg); border-color: var(--dark-border); color: var(--dark-body); }
    body.dark .teacher-icon { background: rgba(212,175,55,0.1); }
    body.dark .teacher-icon svg { stroke: var(--accent); }
  </style>
</head>
<body>
  <header class="ai-header">
    <h1>Tutor AI</h1>
    <p>তোমার পড়াশোনার সেরা সঙ্গী</p>
  </header>

  <div class="chat-area">
    <div class="welcome">
      <div class="teacher-icon">
        <!-- Professional Teacher SVG Icon -->
        <svg viewBox="0 0 24 24">
          <!-- Person/Teacher silhouette with a pointer/board -->
          <circle cx="12" cy="7" r="4"/>
          <path d="M5.5 21c0-4.1 3.1-7 6.5-7s6.5 2.9 6.5 7"/>
          <line x1="5" y1="18" x2="19" y2="18"/>
          <rect x="3" y="17" width="4" height="6" rx="0.5"/>
          <line x1="10" y1="18" x2="10" y2="21"/>
          <line x1="14" y1="18" x2="14" y2="21"/>
          <line x1="8" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <h2>হ্যালো! আমি তোমার Tutor AI</h2>
      <p>আজ কী শিখতে চাও?</p>
    </div>

    <div class="prompt-grid">
      <div class="prompt" onclick="document.getElementById('msg').value='SSC Paragraph Writing এর টিপস দাও'; send()">SSC Paragraph Writing এর টিপস দাও</div>
      <div class="prompt" onclick="document.getElementById('msg').value='Higher Math Trigonometry ব্যাখ্যা করো'; send()">Higher Math Trigonometry ব্যাখ্যা করো</div>
      <div class="prompt" onclick="document.getElementById('msg').value='ভাব সম্প্রসারণ লেখার নিয়ম বলো'; send()">ভাব সম্প্রসারণ লেখার নিয়ম বলো</div>
      <div class="prompt" onclick="document.getElementById('msg').value='Science Chapter 5 এর সারাংশ দাও'; send()">Science Chapter 5 এর সারাংশ দাও</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" id="msg" placeholder="কিছু লিখুন..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" aria-label="Send">↑</button>
    </div>
  </div>

  <!-- Bottom Navigation (consistent across site) -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a>
    <a href="model-test.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a>
    <a href="cpb-ai.html" class="nav-item active"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">AI</span><span>এআই</span></a>
    <a href="extra.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>অতিরিক্ত</span></a>
  </nav>

  <script>
    function send() {
      const input = document.getElementById('msg');
      const msg = input.value.trim();
      if (msg) {
        // Future: real API integration
        alert("Tutor AI: আপনার প্রশ্নের উত্তর তৈরি হচ্ছে...\n\n" + msg);
        input.value = '';
      }
    }
  </script>
</body>
</html>
