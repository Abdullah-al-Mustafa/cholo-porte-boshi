<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor AI - পড়তে বসি</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      background: #F8FAFC;
    }
    .ai-header { 
      background: linear-gradient(135deg, #15803D, #166534); 
      color: white; 
      padding: 18px 20px; 
      text-align: center; 
      flex-shrink: 0;
    }
    .ai-header h1 { font-size: 1.75rem; margin: 0; }
    .chat-container { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px; 
      background: #F8FAFC;
    }
    .welcome { text-align: center; margin: 60px 20px 40px; color: #334155; }
    .welcome h2 { font-size: 1.45rem; margin-bottom: 8px; }
    .example-prompts { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
      gap: 14px; 
      margin: 0 16px; 
    }
    .prompt-card { 
      background: white; 
      border: 1.5px solid #E2E8F0; 
      border-radius: 18px; 
      padding: 18px 14px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.25s; 
    }
    .prompt-card:hover { 
      border-color: #15803D; 
      transform: translateY(-6px); 
      box-shadow: 0 10px 20px rgba(21,128,61,0.12); 
    }
    .input-area { 
      padding: 16px 20px; 
      background: white; 
      border-top: 1px solid #E2E8F0; 
      flex-shrink: 0;
    }
    .input-box { display: flex; gap: 12px; align-items: center; }
    .input-box input { 
      flex: 1; 
      padding: 16px 20px; 
      border: 2px solid #E2E8F0; 
      border-radius: 999px; 
      font-size: 1.05rem; 
    }
    .input-box button { 
      background: #15803D; 
      color: white; 
      border: none; 
      width: 56px; 
      height: 56px; 
      border-radius: 50%; 
      font-size: 1.5rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
  </style>
</head>
<body>
  <header class="ai-header">
    <h1>Tutor AI</h1>
    <p>তোমার পড়াশোনার সেরা সঙ্গী</p>
  </header>

  <div class="chat-container">
    <div class="welcome">
      <h2>হ্যালো! 👋</h2>
      <p>আজ কী শিখতে চাও?</p>
    </div>

    <div class="example-prompts">
      <div class="prompt-card">SSC Paragraph Writing এর টিপস দাও</div>
      <div class="prompt-card">Higher Math Trigonometry ব্যাখ্যা করো</div>
      <div class="prompt-card">ভাব সম্প্রসারণ লেখার নিয়ম বলো</div>
      <div class="prompt-card">Science Chapter 5 এর সারাংশ দাও</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" id="userInput" placeholder="কিছু লিখুন...">
      <button onclick="sendMessage()">↑</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('userInput');
      if (input.value.trim() !== '') {
        alert("Tutor AI: আপনার প্রশ্নের উত্তর প্রস্তুত হচ্ছে...");
        input.value = '';
      }
    }
  </script>
</body>
</html>
