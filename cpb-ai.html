<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CPB AI</title>
  <link rel="icon" type="image/svg+xml" href="cpb-ai-icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      position: relative;
    }

    .ai-workspace {
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--header-height) - var(--bottom-nav-height));
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
      margin: 0 auto;
    }

    @media (min-width: 768px) { .ai-workspace { max-width: 800px; } }
    @media (min-width: 1024px) { .ai-workspace { max-width: 850px; } }
    @media (min-width: 1440px) { .ai-workspace { max-width: 900px; } }
    @media (min-width: 2560px) { .ai-workspace { max-width: 1200px; } }

    .ai-conversation {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: var(--space-4);
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      -webkit-overflow-scrolling: touch;
    }

    @media (min-width: 768px) {
      .ai-conversation { padding: var(--space-6) var(--space-5); gap: var(--space-6); }
    }

    .ai-empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .ai-empty-text {
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      padding: 0 var(--space-4);
      word-break: break-word;
    }

    .ai-message-block {
      animation: fadeIn var(--transition-base);
      width: 100%;
      max-width: 100%;
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
    }

    .ai-message-block.user { display: flex; justify-content: flex-end; }

    .ai-message-content {
      padding: var(--space-4) var(--space-4);
      border-radius: var(--radius-lg);
      line-height: 1.7;
      font-size: clamp(0.875rem, 2vw, 1rem);
      max-width: 100%;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .ai-message-block.user .ai-message-content {
      background: var(--secondary);
      color: var(--body);
      max-width: 85%;
      border-bottom-right-radius: var(--radius-sm);
    }

    .ai-message-block.bot .ai-message-content {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--body);
      max-width: 100%;
      border-bottom-left-radius: var(--radius-sm);
      width: 100%;
      box-sizing: border-box;
    }

    .ai-message-content h3 { font-size: clamp(0.95rem, 2.5vw, 1.125rem); color: var(--heading); margin-bottom: var(--space-3); font-weight: 600; }
    .ai-message-content p { margin-bottom: var(--space-3); }
    .ai-message-content ul, .ai-message-content ol { margin: var(--space-3) 0; padding-left: var(--space-5); }
    .ai-message-content li { margin-bottom: var(--space-2); }
    .ai-message-content pre { background: #1E293B; color: #E2E8F0; padding: var(--space-3); border-radius: var(--radius-md); overflow-x: auto; font-family: monospace; font-size: clamp(0.7rem, 1.5vw, 0.875rem); max-width: 100%; white-space: pre-wrap; word-break: break-all; }
    .ai-message-content code { background: var(--secondary); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: clamp(0.75rem, 1.5vw, 0.875rem); word-break: break-all; }

    .ai-input-section {
      padding: var(--space-3) var(--space-3);
      background: var(--surface);
      border-top: 1px solid var(--border);
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    @media (min-width: 768px) { .ai-input-section { padding: var(--space-3) var(--space-4); } }

    .ai-input-container {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    .ai-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-2xl);
      padding: var(--space-1) var(--space-4);
      transition: all var(--transition-fast);
      min-width: 0;
      box-sizing: border-box;
    }

    .ai-input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(21,128,61,0.08); }

    .ai-input-wrapper input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: clamp(0.875rem, 2vw, 1rem);
      font-family: var(--font-family);
      padding: var(--space-3) 0;
      color: var(--body);
      min-width: 0;
      width: 100%;
    }

    .ai-input-wrapper input::placeholder { color: var(--muted); }

    .ai-send-btn {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .ai-send-btn:hover { background: var(--primary-hover); transform: scale(1.05); box-shadow: 0 4px 12px rgba(21,128,61,0.3); }
    .ai-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .ai-send-btn svg { width: 18px; height: 18px; }

    /* Loading dots */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: var(--space-2) 0;
    }
    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .ai-disclaimer {
      text-align: center;
      padding: var(--space-2) var(--space-2) 0;
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      color: var(--muted);
    }

    /* Dark Mode */
    body.dark .ai-message-block.user .ai-message-content { background: rgba(34,197,94,0.12); }
    body.dark .ai-message-block.bot .ai-message-content { background: var(--dark-surface); border-color: var(--dark-border); }
    body.dark .ai-input-section { background: var(--dark-surface); border-color: var(--dark-border); }
    body.dark .ai-input-wrapper { background: var(--dark-bg); border-color: var(--dark-border); }
    body.dark .ai-input-wrapper input { color: var(--dark-body); }
    body.dark .ai-message-content pre { background: #0F172A; }

    @media (min-width: 2560px) {
      .ai-conversation { padding: var(--space-10) var(--space-8); gap: var(--space-8); }
      .ai-message-content { padding: var(--space-6) var(--space-8); font-size: var(--text-xl); }
      .ai-empty-text { font-size: var(--text-5xl); }
      .ai-input-wrapper { padding: var(--space-3) var(--space-6); border-radius: var(--radius-xl); }
      .ai-input-wrapper input { font-size: var(--text-xl); padding: var(--space-4) 0; }
      .ai-send-btn { width: 60px; height: 60px; min-width: 60px; }
      .ai-send-btn svg { width: 26px; height: 26px; }
      .ai-disclaimer { font-size: var(--text-base); }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner" style="justify-content:center;">
      <span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;letter-spacing:4px;color:white;font-size:clamp(1rem,3vw,1.25rem);">CPB AI</span>
    </div>
  </header>

  <div class="ai-workspace">
    <div class="ai-conversation" id="aiConversation">
      <div class="ai-empty-state" id="aiEmptyState">
        <span class="ai-empty-text">Write something to start...</span>
      </div>
    </div>

    <div class="ai-input-section">
      <div class="ai-input-container">
        <div class="ai-input-wrapper">
          <input type="text" placeholder="Ask anything..." id="aiInput" onkeydown="if(event.key==='Enter')sendMessage()">
        </div>
        <button class="ai-send-btn" onclick="sendMessage()" aria-label="Send" id="sendBtn">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="ai-disclaimer">CPB AI can make mistakes. Please double-check.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a>
    <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>সেটিংস</span></a>
    <a href="cpb-ai.html" class="nav-item active"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg><span>CPB AI</span></a>
    <a href="#" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>পরীক্ষা</span></a>
  </nav>

  <script>
    // ============================================
    // YOUR GEMINI API KEY - PASTE HERE
    // ============================================
    const GEMINI_API_KEY = 'AQ.Ab8RN6J4DXbFqlT-6aQlrEm9jqMZv67gGS3NesSvx9JPrMQm3w';
    // ============================================

    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

    async function sendMessage() {
      const input = document.getElementById('aiInput');
      const sendBtn = document.getElementById('sendBtn');
      const msg = input.value.trim();
      if (!msg) return;

      const conversation = document.getElementById('aiConversation');
      const emptyState = document.getElementById('aiEmptyState');
      if (emptyState) emptyState.remove();

      // Add user message
      conversation.innerHTML += `<div class="ai-message-block user"><div class="ai-message-content"><p>${msg}</p></div></div>`;

      // Add loading indicator
      const loadingId = 'loading-' + Date.now();
      conversation.innerHTML += `
        <div class="ai-message-block bot" id="${loadingId}">
          <div class="ai-message-content">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>`;

      input.value = '';
      sendBtn.disabled = true;
      conversation.scrollTop = conversation.scrollHeight;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: msg }]
            }]
          })
        });

        const data = await response.json();
        
        // Remove loading
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();

        if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
          const reply = data.candidates[0].content.parts[0].text;
          const formattedReply = reply
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>')
            .replace(/\n/g, '<br>');

          conversation.innerHTML += `
            <div class="ai-message-block bot">
              <div class="ai-message-content">${formattedReply}</div>
            </div>`;
        } else {
          conversation.innerHTML += `
            <div class="ai-message-block bot">
              <div class="ai-message-content"><p>Sorry, I couldn't generate a response. Please try again.</p></div>
            </div>`;
        }
      } catch (error) {
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
        conversation.innerHTML += `
          <div class="ai-message-block bot">
            <div class="ai-message-content"><p>Error: ${error.message}. Please check your API key and connection.</p></div>
          </div>`;
      }

      sendBtn.disabled = false;
      conversation.scrollTop = conversation.scrollHeight;
    }
  </script>
</body>
</html>
