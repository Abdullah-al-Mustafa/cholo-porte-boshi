<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tutor - পড়তে বসি</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#15803D">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { width:100%; max-width:100vw; overflow-x:hidden; }
    body { 
      margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column;
      background:#F8FAFC; font-family: var(--font);
      padding-bottom: var(--nav-h);
    }
    /* Top Nav - consistent with other pages */
    .ai-header {
      background: linear-gradient(135deg, #15803D, #166534);
      color: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .ai-header .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: transparent; color: white; cursor: pointer;
      text-decoration: none;
    }
    .ai-header .back-btn svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; }
    .ai-header .title-area {
      display: flex; align-items: center; gap: 12px;
    }
    .ai-header .title-area h1 {
      font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: -0.3px;
    }
    .ai-header .spacer { width: 40px; }

    /* Chat Area */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      background: #F8FAFC;
    }
    .welcome {
      text-align: center; margin: 30px 0 40px;
    }
    .teacher-icon-wrap {
      width: 88px; height: 88px; margin: 0 auto 16px;
      background: rgba(21,128,61,0.08); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .teacher-icon-wrap svg {
      width: 48px; height: 48px; stroke: #15803D; fill: none;
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
    }
    .welcome h2 {
      font-size: 1.5rem; color: #1F2937; margin-bottom: 8px; font-weight: 700;
    }
    .welcome p { color: #475569; font-size: 1.05rem; }

    /* Prompts */
    .prompts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px; margin-bottom: 40px;
    }
    .prompt {
      background: white; border: 1.5px solid #E2E8F0; border-radius: 18px;
      padding: 18px 16px; text-align: center; font-size: 0.95rem;
      line-height: 1.35; cursor: pointer; transition: all 0.25s;
      color: #334155;
    }
    .prompt:hover {
      border-color: #15803D; transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(21,128,61,0.1);
    }

    /* Input Area */
    .input-area {
      padding: 14px 20px 16px; background: white;
      border-top: 1px solid #E2E8F0; flex-shrink: 0;
    }
    .input-box {
      display: flex; align-items: center; gap: 12px;
      max-width: 720px; margin: 0 auto;
    }
    .input-box input {
      flex: 1; padding: 14px 20px; border: 2px solid #E2E8F0;
      border-radius: 999px; font-size: 1.02rem; outline: none;
      transition: border 0.2s; font-family: inherit;
    }
    .input-box input:focus { border-color: #15803D; }
    .send-btn {
      width: 50px; height: 50px; background: #15803D; color: white;
      border: none; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #166534; transform: scale(1.08); }
    .send-btn svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.8; }

    /* Dark mode */
    body.dark { background: var(--dark-bg); }
    body.dark .ai-header { background: linear-gradient(135deg, #062415, #052012); }
    body.dark .chat-area { background: var(--dark-bg); }
    body.dark .welcome h2 { color: var(--dark-heading); }
    body.dark .welcome p { color: var(--dark-body); }
    body.dark .prompt { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
    body.dark .prompt:hover { border-color: var(--accent); }
    body.dark .input-area { background: var(--dark-surface); border-color: var(--dark-border); }
    body.dark .input-box input { background: var(--dark-bg); border-color: var(--dark-border); color: var(--dark-body); }
    body.dark .teacher-icon-wrap { background: rgba(212,175,55,0.1); }
    body.dark .teacher-icon-wrap svg { stroke: var(--accent); }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <header class="ai-header">
    <a href="index.html" class="back-btn" aria-label="Back to Home">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <div class="title-area">
      <!-- Professional Teacher SVG Icon -->
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.8"/>
        <path d="M4 22C4 17.58 7.58 14 12 14C16.42 14 20 17.58 20 22" stroke="white" stroke-width="1.8"/>
        <line x1="8" y1="10" x2="16" y2="10" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <h1 data-t="tutor">Tutor</h1>
    </div>
    <div class="spacer"></div>
  </header>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="welcome">
      <div class="teacher-icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="5"/>
          <path d="M3 22c0-5.5 4-9 9-9s9 3.5 9 9"/>
          <line x1="7" y1="11" x2="17" y2="11"/>
        </svg>
      </div>
      <h2>হ্যালো! আমি তোমার Tutor</h2>
      <p>আজ কী শিখতে চাও?</p>
    </div>

    <div class="prompts">
      <div class="prompt" onclick="quickAsk('SSC Paragraph Writing এর টিপস দাও')">SSC Paragraph Writing এর টিপস দাও</div>
      <div class="prompt" onclick="quickAsk('Higher Math Trigonometry ব্যাখ্যা করো')">Higher Math Trigonometry ব্যাখ্যা করো</div>
      <div class="prompt" onclick="quickAsk('ভাব সম্প্রসারণ লেখার নিয়ম বলো')">ভাব সম্প্রসারণ লেখার নিয়ম বলো</div>
      <div class="prompt" onclick="quickAsk('Science Chapter 5 এর সারাংশ দাও')">Science Chapter 5 এর সারাংশ দাও</div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-box">
      <input type="text" id="userInput" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.874L5.999 12zm0 0h7.07"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span data-t="home">হোম</span></a>
    <a href="model-test.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span data-t="exam">পরীক্ষা</span></a>
    <a href="cpb-ai.html" class="nav-item active"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">AI</span><span data-t="ai">এআই</span></a>
    <a href="tools.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span data-t="tools">টুলস</span></a>
  </nav>

  <script>
    function quickAsk(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    }
    function sendMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (msg) {
        alert("Tutor: আপনার প্রশ্নের উত্তর তৈরি হচ্ছে...\n\n" + msg);
        input.value = '';
      }
    }
  </script>
</body>
</html>
