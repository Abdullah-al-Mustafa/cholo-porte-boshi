<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor AI - পড়তে বসি</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .ai-header { background: linear-gradient(135deg, #15803D, #166534); color: white; padding: 20px; text-align: center; }
    .ai-header h1 { font-size: 1.8rem; margin: 0; }
    .chat-container { flex: 1; padding: 20px; overflow-y: auto; background: #F8FAFC; }
    .welcome { text-align: center; margin: 40px 20px; color: #334155; }
    .welcome h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .example-prompts { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 30px 20px; }
    .prompt-card { background: white; border: 1px solid #E2E8F0; border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .prompt-card:hover { border-color: #15803D; transform: translateY(-4px); box-shadow: 0 8px 15px rgba(21,128,61,0.1); }
    .input-area { padding: 16px; background: white; border-top: 1px solid #E2E8F0; position: sticky; bottom: 0; }
    .input-box { display: flex; gap: 12px; }
    .input-box input { flex: 1; padding: 16px; border: 2px solid #E2E8F0; border-radius: 999px; font-size: 1rem; }
    .input-box button { background: #15803D; color: white; border: none; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
  </style>
</head>
<body style="display:flex; flex-direction:column; height:100vh; margin:0;">
  
  <header class="ai-header">
    <h1>Tutor AI</h1>
    <p>তোমার পড়াশোনার সেরা সঙ্গী</p>
  </header>

  <div class="chat-container">
    <div class="welcome">
      <h2>হ্যালো! 👋</h2>
      <p>আজ কী শিখতে চাও? আমাকে জিজ্ঞাসা করো।</p>
    </div>

    <div class="example-prompts">
      <div class="prompt-card">SSC Paragraph Writing এর টিপস দাও</div>
      <div class="prompt-card">Higher Math এর Trigonometry ব্যাখ্যা করো</div>
      <div class="prompt-card">ভাব সম্প্রসারণ লেখার নিয়ম বলো</div>
      <div class="prompt-card">Science Chapter 5 এর সারাংশ দাও</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" id="userInput" placeholder="কিছু লিখুন...">
      <button onclick="sendMessage()">↑</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('userInput');
      if (input.value.trim() !== '') {
        alert("Tutor AI: আপনার প্রশ্নের উত্তর প্রস্তুত হচ্ছে...\n\n(এখনো backend ইন্টিগ্রেশন বাকি আছে)");
        input.value = '';
      }
    }
  </script>
</body>
</html>
