  <text 
    x="0" 
    y="42" 
    font-family="'Inter', 'Noto Sans Bengali', system-ui, sans-serif" 
    font-size="38" 
    font-weight="700" 
    letter-spacing="6"
    fill="#15803D">CPB</text>
  
  <!-- Subtle education dot accent -->
