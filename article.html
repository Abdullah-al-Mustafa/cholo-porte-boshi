  <style>
    .article-page { max-width: 750px; margin: 0 auto; width: 100%; }
    .article-page img { width: 100%; border-radius: var(--r-md); margin-bottom: var(--sp4); }
    .article-page h1 { font-size: var(--text-3xl); color: var(--heading); margin-bottom: var(--sp2); }
    .article-page .meta { display: flex; gap: var(--sp1); margin-bottom: var(--sp4); flex-wrap: wrap; align-items: center; }
    .article-page .content { font-size: var(--text-base); line-height: 2; color: var(--body); }
    .article-page .content p { margin-bottom: var(--sp3); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; }
    .badge.subject { background: var(--secondary); color: var(--primary); }
    .badge.class { background: var(--primary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary-dark); }
    .voice-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--surface); color: var(--primary); border: 2px solid var(--primary); border-radius: var(--r-full); font-weight: 600; font-size: var(--text-sm); cursor: pointer; transition: all var(--tr-fast); }
    .voice-btn:hover { background: var(--secondary); }
    .voice-btn.playing { background: var(--primary); color: white; border-color: var(--primary); }
    .voice-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .voice-btn.playing svg { stroke: white; }
    body.dark .article-page h1 { color: var(--dark-heading); }
    body.dark .article-page .content { color: var(--dark-body); }
    body.dark .voice-btn { background: var(--dark-surface); border-color: var(--primary); color: var(--primary); }
    body.dark .voice-btn:hover { background: rgba(21,128,61,0.15); }
  </style>
