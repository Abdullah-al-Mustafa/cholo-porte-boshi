<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Articles - চলো পড়তে বসি</title><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .article-page { max-width: 750px; margin: 0 auto; width: 100%; }
    .article-page img { width: 100%; border-radius: var(--radius-xl); margin-bottom: var(--space-6); }
    .article-page h1 { font-size: var(--text-3xl); color: var(--heading); margin-bottom: var(--space-3); }
    .article-page .meta { display: flex; gap: var(--space-2); margin-bottom: var(--space-6); flex-wrap: wrap; }
    .article-page .content { font-size: var(--text-base); line-height: 2; color: var(--body); }
    .article-page .content p { margin-bottom: var(--space-4); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; }
    .badge.subject { background: var(--accent-light); color: var(--primary); }
    .badge.class { background: var(--secondary); color: white; }
    .badge.all { background: var(--accent); color: var(--primary); }
    body.dark .article-page h1 { color: var(--dark-heading); }
    body.dark .article-page .content { color: var(--dark-body); }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="icon-btn"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a><span style="color:rgba(255,255,255,0.85);">Articles</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="article-page" id="articleContent"><p class="text-muted">Loading......</p></div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>Settings</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>Exams</span></a></nav>
  <footer class="footer">[C] 2026-present. All Rights Reserved. চলো পড়তে বসি</footer>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    function clsBadge(c) { if (!c || c === 'All' || c === 'all') return '<span class="badge all">For All</span>'; const map = { '6': 'Class 6', '7': 'Class 7', '8': 'Class 8', '9': 'Class 9', '10': 'Class 10', '9-10': 'Class 9-10' }; return `<span class="badge class">For ${map[c] || c}</span>`; }

    (async () => {
      if (!id) { document.getElementById('articleContent').innerHTML = '<p class="text-muted">Articles পাওয়া যায়নি</p>'; return; }
      const doc = await db.collection('articles').doc(id).get();
      if (!doc.exists) { document.getElementById('articleContent').innerHTML = '<p class="text-muted">Articles পাওয়া যায়নি</p>'; return; }
      const d = doc.data();
      document.getElementById('articleContent').innerHTML = `
        ${d.image ? `<img src="${d.image}" alt="${d.title}">` : ''}
        <h1>${d.title}</h1>
        <div class="meta"><span class="badge subject">${d.subject||'General'}</span>${clsBadge(d.class)}</div>
        <div class="content">${(d.content||'').split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('')}</div>
      `;
    })();
  </script>
</body>
</html>
