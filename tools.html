  <style>
    .tools-page { max-width:700px; margin:0 auto; width:100%; }
    .tools-page h2 { font-size:var(--text-2xl); font-weight:700; color:var(--heading); text-align:center; margin-bottom:var(--sp5); }
    .tools-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:var(--sp2); }
    .tool-card { background:var(--surface); border:1.5px solid var(--border); border-radius:24px; padding:36px 20px 32px; text-align:center; cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:0 6px 12px -4px rgba(0,0,0,0.07); text-decoration:none; color:var(--body); display:flex; flex-direction:column; align-items:center; gap:var(--sp2); }
    .tool-card:hover { border-color:var(--primary-green); transform:translateY(-12px); box-shadow:0 30px 35px -12px rgba(21,128,61,0.2); }
    .tool-icon { width:80px; height:80px; border-radius:22px; background:#ECFDF5; display:flex; align-items:center; justify-content:center; margin-bottom:12px; transition:all 0.2s ease; }
    .tool-card:hover .tool-icon { background:#C6F6D5; transform:scale(1.15); }
    .tool-icon svg { width:38px; height:38px; stroke:var(--primary-green); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .tool-card h3 { font-size:1.12rem; font-weight:600; color:var(--heading); margin:0; }
    .tool-card p { font-size:0.85rem; color:var(--muted); margin:0; }
    body.dark .tool-card { background:var(--dark-card); border-color:var(--dark-border); }
    body.dark .tool-card h3 { color:var(--dark-heading); }
    body.dark .tool-icon { background:rgba(134,239,172,0.15); }
    body.dark .tool-icon svg { stroke:var(--light-green); }
  </style>
