<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>সেটিংস - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .settings-page { max-width: 700px; margin: 0 auto; width: 100%; }
    .settings-section { margin-bottom: var(--sp5); }
    .settings-section-title { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: var(--sp1); padding-left: 4px; }
    .setting-card { display: flex; align-items: center; justify-content: space-between; padding: var(--sp3); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); margin-bottom: var(--sp1); transition: all var(--tr-fast); cursor: pointer; }
    .setting-card:hover { box-shadow: var(--sh-sm); border-color: var(--primary); }
    .setting-left { display: flex; align-items: center; gap: var(--sp2); flex: 1; min-width: 0; }
    .setting-icon { width: 40px; height: 40px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .setting-icon svg { width: 20px; height: 20px; stroke: var(--primary); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .setting-info { min-width: 0; }
    .setting-label { font-weight: 500; font-size: var(--text-sm); color: var(--heading); }
    .setting-desc { font-size: var(--text-xs); color: var(--muted); }
    .setting-right { flex-shrink: 0; margin-left: var(--sp2); }
    .toggle-switch { position: relative; width: 48px; height: 26px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #D1D5DB; border-radius: var(--r-full); transition: var(--tr-fast); }
    .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: var(--tr-fast); }
    input:checked + .toggle-slider { background: var(--primary); }
    input:checked + .toggle-slider:before { transform: translateX(22px); }
    .theme-options { display: flex; gap: 4px; }
    .theme-opt { padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--r-full); font-size: var(--text-xs); font-weight: 500; cursor: pointer; background: var(--surface); color: var(--body); transition: all var(--tr-fast); font-family: var(--font); }
    .theme-opt.active { background: var(--primary); color: white; border-color: var(--primary); }
    .arrow-icon svg { width: 18px; height: 18px; stroke: var(--muted); fill: none; stroke-width: 2; }
    body.dark .setting-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .setting-label { color: var(--dark-heading); }
    body.dark .theme-opt { background: var(--dark-surface); border-color: var(--dark-border); color: var(--dark-body); }
    body.dark .theme-opt.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><a href="index.html" class="header-brand">চলো পড়তে বসি</a><span style="color:white;font-weight:600;">সেটিংস</span><span style="width:40px;"></span></div></header>
  <main class="main-content">
    <div class="settings-page">
      <div class="settings-section"><div class="settings-section-title">Appearance</div>
        <div class="setting-card"><div class="setting-left"><div class="setting-icon" style="background:var(--secondary);"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></div><div class="setting-info"><div class="setting-label">থিম</div><div class="setting-desc">লাইট, ডার্ক বা সিস্টেম</div></div></div><div class="setting-right"><div class="theme-options"><button class="theme-opt active" onclick="setTheme('light',this)">লাইট</button><button class="theme-opt" onclick="setTheme('dark',this)">ডার্ক</button><button class="theme-opt" onclick="setTheme('system',this)">সিস্টেম</button></div></div></div>
      </div>
      <div class="settings-section"><div class="settings-section-title">Language</div>
        <div class="setting-card"><div class="setting-left"><div class="setting-icon" style="background:var(--secondary);"><svg viewBox="0 0 24 24"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg></div><div class="setting-info"><div class="setting-label">ভাষা</div><div class="setting-desc">বাংলা</div></div></div><div class="setting-right arrow-icon"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div></div>
      </div>
      <div class="settings-section"><div class="settings-section-title">About</div>
        <div class="setting-card"><div class="setting-left"><div class="setting-icon" style="background:var(--secondary);"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div><div class="setting-info"><div class="setting-label">চলো পড়তে বসি সম্পর্কে</div><div class="setting-desc">আমাদের সম্পর্কে জানুন</div></div></div><div class="setting-right arrow-icon"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div></div>
        <div class="setting-card"><div class="setting-left"><div class="setting-icon" style="background:var(--secondary);"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="setting-info"><div class="setting-label">ভার্সন</div><div class="setting-desc">v1.0.0</div></div></div></div>
      </div>
    </div>
  </main>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>হোম</span></a><a href="settings.html" class="nav-item active"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>সেটিংস</span></a><a href="cpb-ai.html" class="nav-item"><span style="font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:14px;">CPB</span><span>CPB AI</span></a><a href="exam.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="9 11 11 13 15 9"/></svg><span>পরীক্ষা</span></a></nav>
  <script>
    function setTheme(mode, btn) { document.querySelectorAll('.theme-opt').forEach(b => b.classList.remove('active')); btn.classList.add('active'); if (mode === 'dark') { document.body.classList.add('dark'); localStorage.setItem('cpb-theme', 'dark'); } else if (mode === 'light') { document.body.classList.remove('dark'); localStorage.setItem('cpb-theme', 'light'); } else { const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; prefersDark ? document.body.classList.add('dark') : document.body.classList.remove('dark'); localStorage.setItem('cpb-theme', 'system'); } }
    const saved = localStorage.getItem('cpb-theme') || 'light';
    document.querySelectorAll('.theme-opt').forEach(b => b.classList.remove('active'));
    if (saved === 'dark') { document.body.classList.add('dark'); document.querySelector('.theme-opt:nth-child(2)').classList.add('active'); }
    else if (saved === 'system') { document.querySelector('.theme-opt:nth-child(3)').classList.add('active'); }
    else { document.querySelector('.theme-opt:nth-child(1)').classList.add('active'); }
  </script>
</body>
</html>
