<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>সেটিংস - পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .settings-page { max-width:600px; margin:0 auto; width:100%; }
    .settings-page h2 { font-size:var(--text-2xl); font-weight:700; color:var(--heading); text-align:center; margin-bottom:var(--sp5); }
    .setting-card {
      background: var(--surface); border:1.5px solid var(--border); border-radius:24px;
      padding: 24px 20px; margin-bottom: var(--sp2); display: flex; align-items: center;
      gap: var(--sp3); cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 4px 8px -2px rgba(0,0,0,0.04); text-decoration: none; color: var(--body);
    }
    .setting-card:hover { border-color: var(--primary-green); transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(21,128,61,0.12); }
    .setting-icon { width: 52px; height: 52px; border-radius: 16px; background: #ECFDF5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .setting-icon svg { width: 26px; height: 26px; stroke: var(--primary-green); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .setting-info h3 { font-size: 1.05rem; font-weight: 600; color: var(--heading); margin-bottom: 2px; }
    .setting-info p { font-size: 0.85rem; color: var(--muted); }
    .setting-arrow { margin-left: auto; color: var(--muted); }
    .setting-arrow svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
    body.dark .setting-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .setting-info h3 { color: var(--dark-heading); }
    body.dark .setting-icon { background: rgba(134,239,172,0.15); }
    body.dark .setting-icon svg { stroke: var(--light-green); }
  </style>
</head>
