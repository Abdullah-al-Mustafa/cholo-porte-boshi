<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>সেটিংস - চলো পড়তে বসি</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#15803D"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="css/style.css">
  <style>
    .settings-page { max-width: 600px; margin: 0 auto; width: 100%; }
    .settings-section { margin-bottom: var(--sp6); }
    .settings-section-title { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: var(--sp2); padding-left: 4px; }
    .setting-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp3); margin-bottom: var(--sp1); display: flex; align-items: center; justify-content: space-between; }
    .setting-left { display: flex; align-items: center; gap: var(--sp2); }
    .setting-icon { width: 40px; height: 40px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--secondary); }
    .setting-icon svg { width: 20px; height: 20px; stroke: var(--primary); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .setting-info h4 { font-size: var(--text-sm); font-weight: 600; color: var(--heading); margin-bottom: 2px; }
    .setting-info p { font-size: var(--text-xs); color: var(--muted); }
    .lang-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--r-md); font-family: var(--font); background: var(--surface); color: var(--body); }
    .contact-form input, .contact-form textarea { width: 100%; padding: var(--sp2); margin-bottom: var(--sp1); border: 2px solid var(--border); border-radius: var(--r-md); font-family: var(--font); font-size: var(--text-sm); background: var(--surface); color: var(--body); }
    .contact-form textarea { min-height: 100px; resize: vertical; }
    .contact-form button { width: 100%; }
    .about-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp3); }
    .about-card p { font-size: var(--text-sm); color: var(--body); line-height: 1.7; }
    body.dark .setting-card, body.dark .about-card { background: var(--dark-card); border-color: var(--dark-border); }
    body.dark .setting-info h4 { color: var(--dark-heading); }
    body.dark .lang-select, body.dark .contact-form input, body.dark .contact-form textarea { background: var(--dark-surface); color: var(--dark-body); border-color: var(--dark-border); }
  </style>
</head>
<body>
